u.",tab:"komunikacija",elementId:"sidebar-tab-komunikacija"},{title:"11. Finansije i Donacije 🪙",description:"Transparentno finansijsko poslovanje opštine. Ovde vodite evidenciju svih uplaćenih donacija, troškova za materijal, gorivo, zakup kancelarija i isplate dnevnih naknada, uz automatski obračun ukupnog budžeta i preostalog salda.",tab:"finansije",elementId:"sidebar-tab-finansije"},{title:"12. Teren i eCanvasser ankete 🗺️",description:"Praćenje aktivnosti na terenu i rad od vrata do vrata (door-to-door). Ovde možete simulirati anketiranje birača na mapi, beležiti sigurne glasove, raspoloženje građana i pratiti procente uspešnosti po biračkim mestima.",tab:"ecanvasser",elementId:"sidebar-tab-ecanvasser"}];function VC(){var Fe;const[e,a]=De.useState([]),[t,i]=De.useState([]),[s,c]=De.useState([]),[u,d]=De.useState([]),[h,m]=De.useState([]),[v,g]=De.useState([]),[k,y]=De.useState([]),[_,b]=De.useState([]),[w,A]=De.useState(null),z=(O,se)=>w!==null?w===se?"ring-2 ring-blue-500 bg-[#1b202a] text-white shadow-[0_0_20px_rgba(59,130,246,0.35)] font-bold scale-[1.02] relative z-50":"text-[#9aa3b2] opacity-20 blur-[1px] pointer-events-none":T===O?"bg-[#1b202a] text-white font-bold":"text-[#9aa3b2] hover:text-white hover:bg-white/2",[N,B]=De.useState(!1),[q,D]=De.useState("coord"),[T,I]=De.useState("dashboard"),[V,ne]=De.useState(()=>localStorage.getItem("struktura_selected_opstina")||"Novi Beograd"),re=O=>{if(V==="Vračar")return O;const se=V.toLowerCase().replace(/\s+/g,"_");return`${O}_${se}`},[W,Se]=De.useState({q:"",uloga:"",status:"",faza:"",reon:"",auto:null,iskustvo:null,obukaOsnovna:null,obukaNapredna:null,rasporedjen:null,poreklo:"",odPoverenja:null}),[ie,ae]=De.useState({field:"imePrezime",order:"asc"}),[M,Q]=De.useState(new Set),[_e,J]=De.useState(!1),[Ae,X]=De.useState(!1),[j,P]=De.useState(null),[U,K]=De.useState(!1),[ce,ee]=De.useState(!1),[ye,ge]=De.useState(!1),[je,Xe]=De.useState(()=>{const O=localStorage.getItem("struktura_visible_columns");if(O)try{retu
