                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Naziv biračkog mesta (lokacija)</label>
                  <input
                    type="text"
                    required
                    placeholder="npr. OŠ Sveti Sava"
                    value={naziv}
                    onChange={(e) => setNaziv(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  />
                </div>

                {/* Adresa */}
                <div className="space-y-1">
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Adresa</label>
                  <input
                    type="text"
                    required
                    placeholder="npr. Resavska 17"
                    value={adresa}
                    onChange={(e) => setAdresa(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  />
                </div>

                {/* Deli flag */}
                <div className="flex items-center gap-2 pt-2">
                  <input
                    type="checkbox"
                    id="deli_checkbox"
                    checked={deli}
                    onChange={(e) => setDeli(e.target.checked)}
                    className="rounded border-[#232935] bg-[#161a22] text-blue-500 focus:ring-0 focus:ring-offset-0 w-4 h-4"
                  />
                  <label htmlFor="deli_checkbox" className="text-xs text-gray-300 font-medium select-none cursor-pointer">
                    Zajedničko biračko mesto (deli prostoriju sa drugim BM)
                  </label>
                </div>

                {/* Actions */}
                <div className="pt-4 flex gap-2 justify-end border-t border-[#1e222b]">
                  <button
                    type="button"
                    onClick={() => setIsModalOpen(false)}
                    className="px-4 py-2 text-xs text-gray-400 hover:text-white hover:bg-white/5 rounded-xl transition-colors"
                  >
                    Odustani
                  </button>
                  <button
                    type="submit"
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white rounded-xl transition-colors"
                  >
                    Dodaj biračko mesto
                  </button>
                </div>
              </form>
            )}
          </div>
        </div>
      )}
    </div>
  );
}


// ===== components/MTTab.tsx =====
interface MTTabProps {
  mt: MobilniTim[];
  people: Person[];
  bm: BirackoMesto[];
  onAddMT: (newMT: MobilniTim) => void;
  onDeleteMT: (id: string) => void;
  isReadOnly: boolean;
  allowAddMT?: boolean;
  reoni?: string[];
}

function MTTab({ mt, people, bm, onAddMT, onDeleteMT, isReadOnly, allowAddMT = true, reoni = REONI }: MTTabProps) {
  const [isModalOpen, setIsModalOpen] = useState(false);

  // Form states
  const [reon, setReon] = useState(reoni[0] || 'Neimar');
  const [pokriva, setPokriva] = useState<string[]>([]);
  const [kola, setKola] = useState(1);
  const [memberSearch, setMemberSearch] = useState('');
  const [selectedMembers, setSelectedMembers] = useState<{ id: string; role: 'sef' | 'clan' }[]>([]);

  React.useEffect(() => {
    setReon(reoni[0] || 'Neimar');
  }, [reoni]);

  const handleCloseModal = () => {
    setIsModalOpen(false);
    setPokriva([]);
    setKola(1);
    setSelectedMembers([]);
    setMemberSearch('');
  };

  const handleSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (pokriva.length === 0) {
      alert('Molimo odaberite barem jedno biračko mesto koje ovaj tim pokriva.');
      return;
    }

    const nextId = `MT-${mt.length + 1}-${Math.floor(Math.random() * 900 + 100)}`;
    const sefIds = selectedMembers.filter(m => m.role === 'sef').map(m => m.id);
    const clanIds = selectedMembers.filter(m => m.role === 'clan').map(m => m.id);

    onAddMT({
      id: nextId,
      reon,
      pokriva,
      kola,
      sefMT: sefIds,
      clanovi: clanIds
    });

    handleCloseModal();
  };

  const handleToggleBM = (broj: string) => {
    if (pokriva.includes(broj)) {
      setPokriva(pokriva.filter(b => b !== broj));
    } else {
      setPokriva([...pokriva, broj]);
    }
  };

  return (
    <div className="space-y-6">
      {/* Top action bar */}
      <div className="flex justify-between items-center">
        <h3 className="text-sm font-semibold text-white">Spisak mobilnih timova</h3>
        {(allowAddMT ?? true) && (
          <button
            onClick={() => setIsModalOpen(true)}
            className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white rounded-xl transition-colors flex items-center gap-1.5 justify-center"
          >
            <Plus className="w-4 h-4" />
            Novi mobilni tim
          </button>
        )}
      </div>

      {/* Grid of Mobilni Timovi */}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {mt.map((m) => {
          const sefNames = m.sefMT.map(id => people.find(p => p.id === id)?.imePrezime).filter(Boolean);
          const clanNames = m.clanovi.map(id => people.find(p => p.id === id)?.imePrezime).filter(Boolean);

          return (
            <div 
              key={m.id}
              className="bg-[#101318] border border-[#1e222b] rounded-2xl p-5 hover:border-[#2a303d] transition-all flex flex-col justify-between"
            >
              <div>
                {/* Header */}
                <div className="flex justify-between items-start gap-3">
                  <div>
                    <span className="text-xs font-extrabold uppercase bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-0.5 rounded">
                      Tim {m.id}
                    </span>
                  </div>

                  {!isReadOnly && (
                    <button
                      onClick={() => {
                        if (confirm(`Da li ste sigurni da želite obrisati mobilni tim ${m.id}?`)) {
                          onDeleteMT(m.id);
                        }
                      }}
                      className="text-[#9aa3b2] hover:text-red-400 p-1 rounded-lg hover:bg-white/5 transition-colors"
                      title="Obriši"
                    >
                      <Trash2 className="w-4 h-4" />
                    </button>
                  )}
                </div>

                {/* Covered Polling Stations */}
                <div className="mt-4">
                  <div className="text-[10px] text-[#9aa3b2] uppercase tracking-wider font-semibold">Pokriva biračka mesta</div>
                  <div className="mt-1.5 flex flex-wrap gap-1">
                    {m.pokriva.map(broj => (
                      <span key={broj} className="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded-md font-bold">
                        BM {broj}
                      </span>
                    ))}
                  </div>
                </div>

                {/* Logistical Stats */}
                <div className="mt-4 p-3 bg-[#161a22] rounded-xl border border-[#232935] flex justify-between items-center text-xs text-gray-300">
                  <div className="flex items-center gap-1.5">
                    <Car className="w-4 h-4 text-[#9aa3b2]" />
                    <span>Dostupno vozila:</span>
                  </div>
                  <span className="font-bold text-white bg-white/5 border border-white/10 px-2 py-0.5 rounded-md">
                    {m.kola} {m.kola === 1 ? 'auto' : 'auta'}
                  </span>
                </div>

                {/* Team assignments */}
                <div className="mt-5 space-y-3.5">
                  {/* Šef MT */}
                  <div className="space-y-1">
                    <div className="text-[10px] text-[#9aa3b2] uppercase tracking-wider font-semibold flex items-center gap-1">
                      <Shield className="w-3 h-3 text-emerald-400" />
                      <span>Šef mobilnog tima</span>
                    </div>
                    {sefNames.length > 0 ? (
                      <div className="text-xs text-white font-semibold">
                        {sefNames.join(', ')}
                      </div>
                    ) : (
                      <div className="text-xs text-red-400 font-medium flex items-center gap-1 italic">
                        <AlertTriangle className="w-3 h-3" />
                        Nije raspoređen
                      </div>
                    )}
                  </div>

                  {/* Članovi MT */}
                  <div className="space-y-1">
                    <div className="text-[10px] text-[#9aa3b2] uppercase tracking-wider font-semibold flex items-center gap-1">
                      <Users className="w-3 h-3 text-indigo-400" />
                      <span>Članovi tima ({clanNames.length})</span>
                    </div>
                    {clanNames.length > 0 ? (
                      <div className="text-xs text-white space-y-0.5">
                        {clanNames.map((name, i) => (
                          <div key={i} className="flex items-center gap-1.5">
                            <span className="w-1 h-1 bg-emerald-400 rounded-full" />
                            <span>{name}</span>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-xs text-[#9aa3b2] italic">Nema raspoređenih članova</div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add MT Modal */}
      {isModalOpen && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4 animate-fade-in">
          <div className="bg-[#101318] border border-[#1e222b] w-full max-w-md rounded-2xl overflow-hidden shadow-xl">
            <div className="px-6 py-4 border-b border-[#1e222b] flex justify-between items-center">
              <h3 className="text-sm font-semibold text-white">Kreiraj novi mobilni tim</h3>
              <button 
                onClick={handleCloseModal}
                className="text-gray-400 hover:text-white p-1 rounded-lg hover:bg-white/5"
              >
                <X className="w-4 h-4" />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              {/* Member Selection Section */}
              <div className="space-y-2 pb-4 border-b border-[#1e222b]">
                <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">
                  Izaberi članove mobilnog tima
                </label>
                
                {/* Search input */}
                <div className="relative">
                  <span className="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <Search className="w-3.5 h-3.5 text-gray-500" />
                  </span>
                  <input
                    type="text"
                    placeholder="Pretraži osobe po imenu..."
                    value={memberSearch}
                    onChange={(e) => setMemberSearch(e.target.value)}
                    className="w-full pl-9 pr-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
                  />
                </div>

                {/* Search results dropdown/scrollable area */}
                {memberSearch.trim() !== '' && (
                  <div className="max-h-44 overflow-y-auto border border-[#232935] bg-[#101318] rounded-xl divide-y divide-[#1e222b] shadow-lg">
                    {(() => {
                      const query = memberSearch.toLowerCase();
                      const filtered = people.filter(p => 
                        p.imePrezime.toLowerCase().includes(query) &&
                        !selectedMembers.some(sm => sm.id === p.id)
                      );

                      if (filtered.length === 0) {
                        return (
                          <div className="p-3 text-xs text-gray-500 text-center italic">
                            Nema rezultata za "{memberSearch}"
                          </div>
                        );
                      }

                      return filtered.map(p => (
                        <div key={p.id} className="p-2.5 flex items-center justify-between gap-2 hover:bg-white/2 transition-colors">
                          <div className="min-w-0">
                            <p className="text-xs font-semibold text-white truncate">{p.imePrezime}</p>
                            <p className="text-[10px] text-[#9aa3b2] truncate">
                              {p.uloga || 'Bez uloge'}
                            </p>
                          </div>
                          
                          <div className="flex gap-1 shrink-0">
                            <button
                              type="button"
                              onClick={() => {
                                setSelectedMembers([...selectedMembers, { id: p.id, role: 'sef' }]);
                                setMemberSearch('');
                              }}
                              className="px-2 py-1 bg-amber-500/10 hover:bg-amber-500/25 text-[9px] font-bold uppercase text-amber-400 border border-amber-500/20 rounded transition-colors"
                            >
                              + Šef MT
                            </button>
                            <button
                              type="button"
                              onClick={() => {
                                setSelectedMembers([...selectedMembers, { id: p.id, role: 'clan' }]);
                                setMemberSearch('');
                              }}
                              className="px-2 py-1 bg-indigo-500/10 hover:bg-indigo-500/25 text-[9px] font-bold uppercase text-indigo-400 border border-indigo-500/20 rounded transition-colors"
                            >
                              + Član MT
                            </button>
                          </div>
                        </div>
                      ));
                    })()}
                  </div>
                )}

                {/* Selected members list */}
                <div className="space-y-1.5 mt-2">
                  <div className="text-[9px] font-bold text-gray-400 uppercase tracking-wider block">Izabrani članovi ({selectedMembers.length})</div>
                  {selectedMembers.length === 0 ? (
                    <div className="p-2.5 border border-[#232935] border-dashed bg-[#161a22]/20 rounded-xl text-center text-xs text-gray-500 italic">
                      Nema izabranih članova još. Pretražite iznad za dodavanje.
                    </div>
                  ) : (
                    <div className="space-y-1.5 max-h-36 overflow-y-auto pr-1">
                      {selectedMembers.map(m => {
                        const personObj = people.find(p => p.id === m.id);
                        if (!personObj) return null;

                        return (
                          <div key={m.id} className="p-2 bg-[#161a22] border border-[#232935] rounded-xl flex items-center justify-between gap-3">
                            <div className="min-w-0">
                              <p className="text-xs font-semibold text-white truncate">{personObj.imePrezime}</p>
                              <p className="text-[9px] text-[#9aa3b2] truncate capitalize">{personObj.uloga || 'Volonter'}</p>
                            </div>
                            
                            <div className="flex items-center gap-1.5">
                              {m.role === 'sef' ? (
                                <span className="px-1.5 py-0.5 bg-amber-500/15 border border-amber-500/30 text-amber-400 text-[8px] font-extrabold uppercase rounded">
                                  Šef MT
                                </span>
                              ) : (
                                <span className="px-1.5 py-0.5 bg-indigo-500/15 border border-indigo-500/30 text-indigo-400 text-[8px] font-extrabold uppercase rounded">
                                  Član MT
                                </span>
                              )}
                              
                              <button
                                type="button"
                                onClick={() => setSelectedMembers(selectedMembers.filter(sm => sm.id !== m.id))}
                                className="text-gray-400 hover:text-red-400 p-1 rounded-md hover:bg-white/5 transition-colors"
                              >
                                <X className="w-3.5 h-3.5" />
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

              {/* Vozila count */}
              <div className="space-y-1">
                <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Dostupan broj automobila</label>
                <input
                  type="number"
                  min="0"
                  max="10"
                  required
                  value={kola}
                  onChange={(e) => setKola(Number(e.target.value))}
                  className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                />
              </div>

              {/* Covered BMs checklist */}
              <div className="space-y-1.5">
                <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">Biračka mesta koja pokriva (Odaberi više)</label>
                <div className="max-h-32 overflow-y-auto border border-[#232935] bg-[#161a22] rounded-xl p-3 grid grid-cols-2 gap-2">
                  {bm.map(b => (
                    <div 
                      key={b.broj}
                      onClick={() => handleToggleBM(b.broj)}
                      className={`p-2 rounded-lg border text-xs cursor-pointer select-none transition-all flex items-center justify-between ${
                        pokriva.includes(b.broj)
                          ? 'bg-indigo-500/10 border-indigo-500/40 text-indigo-400 font-semibold'
                          : 'bg-[#0f1218] border-[#232935] text-gray-300 hover:border-gray-500'
                      }`}
                    >
                      <span>BM {b.broj}</span>
                      {pokriva.includes(b.broj) && <Check className="w-3.5 h-3.5" />}
                    </div>
                  ))}
                </div>
              </div>

              {/* Actions */}
              <div className="pt-4 flex gap-2 justify-end border-t border-[#1e222b]">
                <button
                  type="button"
                  onClick={handleCloseModal}
                  className="px-4 py-2 text-xs text-gray-400 hover:text-white hover:bg-white/5 rounded-xl transition-colors"
                >
                  Odustani
                </button>
                <button
                  type="submit"
                  className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white rounded-xl transition-colors"
                >
                  Kreiraj mobilni tim
                </button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}


// ===== components/AssignTab.tsx =====
interface AssignTabProps {
  people: Person[];
  bm: BirackoMesto[];
  mt: MobilniTim[];
  onAssign: (
    pid: string, 
    tipAngazmana: 'Kontrola izbora' | 'VDV' | 'Call centar' | 'Logistika', 
    targetId: string, 
    targetRole: string,
    dodatneOpcije?: { jeStudent?: 'Da' | 'Ne' }
  ) => void;
  onRemoveAssignment: (pid: string) => void;
  isReadOnly: boolean;
}

function AssignTab({ people, bm, mt, onAssign, onRemoveAssignment, isReadOnly }: AssignTabProps) {
  // Form state
  const [selectedPid, setSelectedPid] = useState('');
  const [engagementType, setEngagementType] = useState<'Kontrola izbora' | 'VDV' | 'Call centar' | 'Logistika'>('Kontrola izbora');
  const [targetId, setTargetId] = useState('');
  const [targetRole, setTargetRole] = useState('');
  const [isStudent, setIsStudent] = useState<'Da' | 'Ne'>('Ne');

  // Search state for main search
  const [searchQuery, setSearchQuery] = useState('');

  // Dropdown search state for person selection
  const [isOpen, setIsOpen] = useState(false);
  const [personSearch, setPersonSearch] = useState('');
  const dropdownRef = useRef<HTMLDivElement>(null);

  useEffect(() => {
    function handleClickOutside(event: MouseEvent) {
      if (dropdownRef.current && !dropdownRef.current.contains(event.target as Node)) {
        setIsOpen(false);
      }
    }
    document.addEventListener('mousedown', handleClickOutside);
    return () => {
      document.removeEventListener('mousedown', handleClickOutside);
    };
  }, []);

  // Reset helper
  const handleAssignSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (!selectedPid) {
      alert('Molimo odaberite osobu.');
      return;
    }
    
    if (engagementType === 'Kontrola izbora') {
      if (!targetId || !targetRole) {
        alert('Molimo odaberite biračko mesto i ulogu.');
        return;
      }
      onAssign(selectedPid, 'Kontrola izbora', targetId, targetRole);
    } else if (engagementType === 'VDV') {
      onAssign(selectedPid, 'VDV', '', '', { jeStudent: isStudent });
    } else if (engagementType === 'Call centar') {
      onAssign(selectedPid, 'Call centar', '', '');
    } else if (engagementType === 'Logistika') {
      onAssign(selectedPid, 'Logistika', '', '');
    }
    
    // Reset selection
    setSelectedPid('');
    setPersonSearch('');
    setTargetId('');
    setTargetRole('');
    setIsStudent('Ne');
  };

  // Filter people who already have assignments or filter by search query
  const assignedPeople = people.filter(p => p.rasporedjen);
  const unassignedPeople = people.filter(p => !p.rasporedjen);

  const filteredUnassigned = unassignedPeople.filter(p => 
    p.imePrezime.toLowerCase().includes(personSearch.toLowerCase()) ||
    (p.uloga && p.uloga.toLowerCase().includes(personSearch.toLowerCase()))
  );
  const filteredAssigned = assignedPeople.filter(p => 
    p.imePrezime.toLowerCase().includes(personSearch.toLowerCase()) ||
    (p.uloga && p.uloga.toLowerCase().includes(personSearch.toLowerCase()))
  );

  // Match target options based on type (Kontrola izbora maps to polling stations)
  const targetOptions = bm.map(b => ({ id: b.broj, name: `BM ${b.broj} — ${b.naziv}` }));

  // Role options for Kontrola izbora
  const roleOptions = [
    { value: 'kontrolor', label: 'Kontrolor' },
    { value: 'mobilni_tim', label: 'Mobilni tim' },
    { value: 'sef_bm', label: 'Šef biračkog mesta' }
  ];

  return (
    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
      {/* Left panel: Assignment Form */}
      <div className="xl:col-span-4 space-y-4">
        <h3 className="text-sm font-semibold text-white flex items-center gap-2">
          <UserCheck className="w-4.5 h-4.5 text-blue-400" />
          <span>Nova dodela dužnosti</span>
        </h3>

        {isReadOnly ? (
          <div className="p-6 bg-[#101318] border border-[#1e222b] rounded-2xl text-xs text-[#9aa3b2] italic text-center">
            Nemate dozvolu za kreiranje rasporeda u ovom režimu rada. Prijavite se kao Opštinski koordinator.
          </div>
        ) : (
          <form onSubmit={handleAssignSubmit} className="p-6 bg-[#101318] border border-[#1e222b] rounded-2xl space-y-4">
            {/* Step 1: Osoba */}
            <div className="space-y-1 relative font-sans" ref={dropdownRef}>
              <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">Izaberi osobu</label>
              <div className="relative">
                <input
                  type="text"
                  required={!selectedPid}
                  placeholder="Pretraži i odaberi iz baze..."
                  value={personSearch}
                  onChange={(e) => {
                    setPersonSearch(e.target.value);
                    setIsOpen(true);
                    
                    // Reset selection if query doesn't match the selected person's exact name
                    const selectedPerson = people.find(p => p.id === selectedPid);
                    if (selectedPerson && selectedPerson.imePrezime !== e.target.value) {
                      setSelectedPid('');
                    }
                  }}
                  onFocus={() => setIsOpen(true)}
                  className="w-full pl-9 pr-8 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all"
                />
                <Search className="absolute left-3 top-2.5 w-3.5 h-3.5 text-gray-500" />
                {personSearch && (
                  <button
                    type="button"
                    onClick={() => {
                      setSelectedPid('');
                      setPersonSearch('');
                      setIsOpen(false);
                    }}
                    className="absolute right-3 top-2.5 text-gray-500 hover:text-white transition-colors"
                  >
                    <X className="w-3.5 h-3.5" />
                  </button>
                )}
              </div>

              {isOpen && (
                <div className="absolute z-50 w-full mt-1 bg-[#101318] border border-[#232935] rounded-xl shadow-2xl max-h-60 overflow-y-auto overflow-x-hidden divide-y divide-[#232935]/50">
                  {filteredUnassigned.length === 0 && filteredAssigned.length === 0 ? (
                    <div className="p-3 text-xs text-gray-500 text-center">Nema rezultata za "{personSearch}"</div>
                  ) : (
                    <>
                      {filteredUnassigned.length > 0 && (
                        <div className="p-1.5 space-y-0.5">
                          <div className="px-2 py-1 text-[9px] font-bold text-blue-400 uppercase tracking-wider bg-blue-500/5 rounded-md">
                            Slobodni volonteri
                          </div>
                          {filteredUnassigned.map(p => (
                            <button
                              key={p.id}
                              type="button"
                              onClick={() => {
                                setSelectedPid(p.id);
                                setPersonSearch(p.imePrezime);
                                setIsOpen(false);
                              }}
                              className={`w-full text-left px-2.5 py-2 text-xs rounded-lg transition-colors flex items-center justify-between ${
                                selectedPid === p.id 
                                  ? 'bg-blue-600/20 text-blue-400 font-semibold' 
                                  : 'text-gray-300 hover:bg-white/5'
                              }`}
                            >
                              <span>{p.imePrezime}</span>
                              <span className="text-[10px] text-[#9aa3b2]/70 font-normal">({p.uloga || 'bez uloge'})</span>
                            </button>
                          ))}
                        </div>
                      )}

                      {filteredAssigned.length > 0 && (
                        <div className="p-1.5 space-y-0.5">
                          <div className="px-2 py-1 text-[9px] font-bold text-amber-400 uppercase tracking-wider bg-amber-500/5 rounded-md">
                            Već raspoređeni
                          </div>
                          {filteredAssigned.map(p => (
                            <button
                              key={p.id}
                              type="button"
                              onClick={() => {
                                setSelectedPid(p.id);
                                setPersonSearch(p.imePrezime);
                                setIsOpen(false);
                              }}
                              className={`w-full text-left px-2.5 py-2 text-xs rounded-lg transition-colors flex items-center justify-between ${
                                selectedPid === p.id 
                                  ? 'bg-blue-600/20 text-blue-400 font-semibold' 
                                  : 'text-gray-300 hover:bg-white/5'
                              }`}
                            >
                              <span className="text-gray-400">[R] {p.imePrezime}</span>
                              <span className="text-[10px] text-[#9aa3b2]/50 font-normal">({p.uloga})</span>
                            </button>
                          ))}
                        </div>
                      )}
                    </>
                  )}
                </div>
              )}
            </div>

            {/* Step 2: Tip angažmana */}
            <div className="space-y-1">
              <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">Tip angažmana</label>
              <div className="grid grid-cols-2 gap-2">
                <button
                  type="button"
                  onClick={() => { setEngagementType('Kontrola izbora'); setTargetId(''); setTargetRole(''); }}
                  className={`p-2.5 rounded-xl border text-xs font-semibold flex flex-col items-center justify-center gap-1.5 transition-all text-center ${
                    engagementType === 'Kontrola izbora'
                      ? 'bg-blue-600/15 border-blue-500 text-blue-400'
                      : 'bg-[#161a22] border-[#232935] text-gray-400 hover:text-white'
                  }`}
                >
                  <Shield className="w-4 h-4" />
                  <span>Kontrola izbora</span>
                </button>
                <button
                  type="button"
                  onClick={() => { setEngagementType('VDV'); }}
                  className={`p-2.5 rounded-xl border text-xs font-semibold flex flex-col items-center justify-center gap-1.5 transition-all text-center ${
                    engagementType === 'VDV'
                      ? 'bg-amber-600/15 border-amber-500 text-amber-400'
                      : 'bg-[#161a22] border-[#232935] text-gray-400 hover:text-white'
                  }`}
                >
                  <Users className="w-4 h-4" />
                  <span>VDV</span>
                </button>
                <button
                  type="button"
                  onClick={() => { setEngagementType('Call centar'); }}
                  className={`p-2.5 rounded-xl border text-xs font-semibold flex flex-col items-center justify-center gap-1.5 transition-all text-center ${
                    engagementType === 'Call centar'
                      ? 'bg-purple-600/15 border-purple-500 text-purple-400'
                      : 'bg-[#161a22] border-[#232935] text-gray-400 hover:text-white'
                  }`}
                >
                  <Phone className="w-4 h-4" />
                  <span>Call centar</span>
                </button>
                <button
                  type="button"
                  onClick={() => { setEngagementType('Logistika'); }}
                  className={`p-2.5 rounded-xl border text-xs font-semibold flex flex-col items-center justify-center gap-1.5 transition-all text-center ${
                    engagementType === 'Logistika'
                      ? 'bg-emerald-600/15 border-emerald-500 text-emerald-400'
                      : 'bg-[#161a22] border-[#232935] text-gray-400 hover:text-white'
                  }`}
                >
                  <Truck className="w-4 h-4" />
                  <span>Logistika</span>
                </button>
              </div>
            </div>

            {/* Step 3: Fields depending on option selection */}
            {engagementType === 'Kontrola izbora' && (
              <>
                {/* ODABERI BIRAČKO MESTO */}
                <div className="space-y-1">
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">
                    Odaberi biračko mesto
                  </label>
                  <select
                    required
                    value={targetId}
                    onChange={(e) => setTargetId(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  >
                    <option value="">-- Odaberi opciju --</option>
                    {targetOptions.map(opt => (
                      <option key={opt.id} value={opt.id}>{opt.name}</option>
                    ))}
                  </select>
                </div>

                {/* ULOGA / DUŽNOST NA TERENU */}
                <div className="space-y-1">
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">
                    Uloga / Dužnost na terenu
                  </label>
                  <select
                    required
                    value={targetRole}
                    onChange={(e) => setTargetRole(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  >
                    <option value="">-- Odaberi dužnost --</option>
                    {roleOptions.map(opt => (
                      <option key={opt.value} value={opt.value}>{opt.label}</option>
                    ))}
                  </select>
                </div>
              </>
            )}

            {engagementType === 'VDV' && (
              /* DA LI JE STUDENT */
              <div className="space-y-1">
                <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">
                  Da li je student (DA/NE)
                </label>
                <select
                  required
                  value={isStudent}
                  onChange={(e) => setIsStudent(e.target.value as 'Da' | 'Ne')}
                  className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                >
                  <option value="Da">Da</option>
                  <option value="Ne">Ne</option>
                </select>
              </div>
            )}

            {/* Submit button */}
            <button
              type="submit"
              className="w-full mt-4 py-2 bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white rounded-xl transition-colors flex items-center justify-center gap-1.5"
            >
              Potvrdi i rasporedi
              <ArrowRight className="w-4 h-4" />
            </button>
          </form>
        )}
      </div>

      {/* Right panel: Assignment Log Table */}
      <div className="xl:col-span-8 space-y-4">
        <div className="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center">
          <h3 className="text-sm font-semibold text-white">Pregled svih raspoređenih ({assignedPeople.length})</h3>

          {/* Table search filter */}
          <div className="relative max-w-xs w-full">
            <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 pointer-events-none">
              <Search className="w-3.5 h-3.5" />
            </span>
            <input
              type="text"
              placeholder="Pretraži raspored..."
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              className="w-full pl-8 pr-3 py-1.5 text-xs bg-[#101318] border border-[#1e222b] rounded-xl text-white placeholder-gray-500 focus:outline-none"
            />
          </div>
        </div>

        {assignedPeople.length === 0 ? (
          <div className="p-12 text-center bg-[#101318] border border-[#1e222b] rounded-2xl space-y-1.5">
            <Users className="w-8 h-8 text-gray-500 mx-auto" />
            <h4 className="text-xs font-semibold text-white">Nema raspoređenih članova</h4>
            <p className="text-[11px] text-[#9aa3b2]">Iskoristite obrazac sa leve strane da dodelite dužnost prvom posmatraču.</p>
          </div>
        ) : (
          <div className="bg-[#101318] border border-[#1e222b] rounded-2xl overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse text-xs">
                <thead>
                  <tr className="border-b border-[#1e222b] text-[#9aa3b2] bg-[#0c0e12]">
                    <th className="p-3.5 font-semibold">Ime i prezime</th>
                    <th className="p-3.5 font-semibold">Zvanična uloga</th>
                    <th className="p-3.5 font-semibold">Dodeljen zadatak</th>
                    <th className="p-3.5 font-semibold">Lokacija / Tim</th>
                    {!isReadOnly && <th className="p-3.5 font-semibold text-right">Akcija</th>}
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#1e222b]/50">
                  {assignedPeople
                    .filter(p => p.imePrezime.toLowerCase().includes(searchQuery.toLowerCase()))
                    .map((p) => {
                      // Lookup where they are assigned
                      let locationStr = '—';
                      let dutyStr = '—';

                      if (p.tipAngazmana === 'Kontrola izbora') {
                        const activeBM = bm.find(b => b.broj === p.bm);
                        locationStr = activeBM ? `BM ${activeBM.broj} — ${activeBM.naziv}` : `BM ${p.bm || '—'}`;
                        dutyStr = p.dodelaUloga === 'kontrolor' ? 'Kontrolor' : (p.dodelaUloga === 'mobilni_tim' ? 'Mobilni tim' : (p.dodelaUloga === 'sef_bm' ? 'Šef biračkog mesta' : (p.dodelaUloga || 'Kontrola izbora')));
                      } else if (p.tipAngazmana === 'VDV') {
                        locationStr = 'Terenska akcija VDV';
                        dutyStr = `VDV ${p.jeStudent === 'Da' ? '(Student)' : '(Nije student)'}`;
                      } else if (p.tipAngazmana === 'Call centar') {
                        locationStr = 'Call centar';
                        dutyStr = 'Operater';
                      } else if (p.tipAngazmana === 'Logistika') {
                        locationStr = 'Kancelarija / Teren';
                        dutyStr = 'Logistika';
                      } else {
                        // Fallback to legacy assignments (if any)
                        // Check BM
                        const activeBM = bm.find(b => b.sefBM.includes(p.id) || b.kontrolori.includes(p.id));
                        if (activeBM) {
                          locationStr = `BM ${activeBM.broj} — ${activeBM.naziv}`;
                          dutyStr = activeBM.sefBM.includes(p.id) ? 'Šef biračkog mesta' : 'Kontrolor';
                        }

                        // Check MT
                        const activeMT = mt.find(m => m.sefMT.includes(p.id) || m.clanovi.includes(p.id));
                        if (activeMT) {
                          locationStr = `Mobilni tim: Tim ${activeMT.id}`;
                          dutyStr = activeMT.sefMT.includes(p.id) ? 'Šef mobilnog tima' : 'Član mobilnog tima';
                        }
                      }

                      return (
                        <tr key={p.id} className="text-gray-300 hover:bg-white/2">
                          <td className="p-3.5 font-semibold text-white">{p.imePrezime}</td>
                          <td className="p-3.5 capitalize text-gray-400">{p.uloga}</td>
                          <td className="p-3.5">
                            <span className="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-blue-500/10 text-blue-400 border border-blue-500/20">
                              {dutyStr}
                            </span>
                          </td>
                          <td className="p-3.5 text-xs font-semibold text-white">{locationStr}</td>
                          
                          {!isReadOnly && (
                            <td className="p-3.5 text-right">
                              <button
                                onClick={() => {
                                  if (confirm(`Da li ste sigurni da želite skinuti raspored za korisnika ${p.imePrezime}?`)) {
                                    onRemoveAssignment(p.id);
                                  }
                                }}
                                className="p-1 text-[#9aa3b2] hover:text-red-400 hover:bg-white/5 rounded-lg transition-colors inline-flex items-center gap-1"
                                title="Ukloni sa zadatka"
                              >
                                <Trash2 className="w-3.5 h-3.5" />
                                <span className="text-[10px] font-bold">Ukloni</span>
                              </button>
                            </td>
                          )}
                        </tr>
                      );
                    })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ===== components/ObukeTab.tsx =====
interface ObukeTabProps {
  obuke: Obuka[];
  people: Person[];
  onAddObuka: (newObuka: Obuka) => void;
  onDeleteObuka: (obukaId: string) => void;
  onUpdateAttendance: (obukaId: string, pid: string, status: 'pozvan' | 'prisustvovao' | 'nije prisustvovao', komentar?: string) => void;
  isReadOnly: boolean;
  allowScheduleObuka?: boolean;
  trainingTypes?: ('kontrolor' | 'vdv' | 'call' | 'sefBM' | 'mt')[];
  isColumnVisible?: (key: string) => boolean;
  hideTableView?: boolean;
}

function ObukeTab({ obuke, people, onAddObuka, onDeleteObuka, onUpdateAttendance, isReadOnly, allowScheduleObuka = false, trainingTypes = ['kontrolor','vdv','call'], isColumnVisible = () => true, hideTableView = false }: ObukeTabProps) {
  // Navigation sub-tabs
  const [viewMode, setViewMode] = useState<'tabela' | 'evidencija'>(hideTableView ? 'evidencija' : 'tabela');
  
  const trainingColumnLabels: Record<string, string> = {
    obuka_kontrolor: 'Obuka za kontrolora',
    obuka_vdv: 'Obuka za vdv',
    obuka_call: 'Obuka za call centar',
    obuka_sefBM: 'Obuka za šefove BM',
    obuka_mt: 'Obuka za MT'
  };

  const defaultVisibleTrainingColumns = trainingTypes.reduce((acc, type) => {
    const key = type === 'kontrolor' ? 'obuka_kontrolor'
      : type === 'vdv' ? 'obuka_vdv'
      : type === 'call' ? 'obuka_call'
      : type === 'sefBM' ? 'obuka_sefBM'
      : 'obuka_mt';
    acc[key] = true;
    return acc;
  }, {} as Record<string, boolean>);

  const [visibleTrainingColumns, setVisibleTrainingColumns] = useState<Record<string, boolean>>(defaultVisibleTrainingColumns);

  useEffect(() => {
    setVisibleTrainingColumns(defaultVisibleTrainingColumns);
  }, [trainingTypes]);

  const isTrainingColumnVisible = (key: string) => {
    return visibleTrainingColumns[key] && isColumnVisible(key);
  };

  const toggleTrainingColumn = (key: string) => {
    setVisibleTrainingColumns((prev) => ({
      ...prev,
      [key]: !prev[key]
    }));
  };

  const hasLocalColumnToggle = trainingTypes.includes('mt');

  // Selection states for individual sessions
  const [selectedObukaId, setSelectedObukaId] = useState<string>(obuke[0]?.id || '');
  const [isModalOpen, setIsModalOpen] = useState(false);
  const [isColumnDropdownOpen, setIsColumnDropdownOpen] = useState(false);

  // Search filter for table of people
  const [searchQuery, setSearchQuery] = useState('');

  // Form states for scheduling training
  const [naziv, setNaziv] = useState('Obuka za kontrolore');
  const [tip, setTip] = useState<'uživo' | 'online'>('uživo');
  const [datum, setDatum] = useState('');
  const [invitedPids, setInvitedPids] = useState<string[]>([]);
  const [inviteSearchTerm, setInviteSearchTerm] = useState('');
  
  useEffect(() => {
    if (hideTableView) {
      setViewMode('evidencija');
    }
  }, [hideTableView]);

  const selectedObuka = obuke.find(o => o.id === selectedObukaId) || obuke[0];

  const handleSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (!naziv || !datum) return;

    const nextId = `OB-${obuke.length + 1}-${Math.floor(Math.random() * 900 + 100)}`;
    
    // Construct invited users array
    const ucesnici: UcesnikObuke[] = invitedPids.map(pid => ({
      pid,
      status: 'pozvan',
      komentar: ''
    }));

    onAddObuka({
      id: nextId,
      naziv,
      tip,
      datum,
      ucesnici
    });

    // Reset
    setNaziv('Obuka za kontrolore');
    setDatum('');
    setInvitedPids([]);
    setInviteSearchTerm('');
    setIsModalOpen(false);
    setSelectedObukaId(nextId);
  };

  const handleToggleInvite = (pid: string) => {
    if (invitedPids.includes(pid)) {
      setInvitedPids(invitedPids.filter(id => id !== pid));
    } else {
      setInvitedPids([...invitedPids, pid]);
    }
  };

  // Helper to extract training status for a person
  const getTrainingStatus = (pid: string, type: 'kontrolor' | 'vdv' | 'call' | 'sefBM' | 'mt') => {
    const matches = obuke.filter(o => {
      const name = o.naziv.toLowerCase();
      if (type === 'kontrolor') return name.includes('kontrolor');
      if (type === 'vdv') return name.includes('vdv');
      if (type === 'call') return name.includes('call') || name.includes('kol') || name.includes('centar');
      if (type === 'sefBM') return name.includes('sef') || name.includes('šef') || (name.includes('bm') && name.includes('šef')) || name.includes('šefove');
      if (type === 'mt') return name.includes('mt') || name.includes('mobilni') || name.includes('mobilni tim');
      return false;
    });

    let best: { status: 'pozvan' | 'prisustvovao' | 'nije prisustvovao'; date: string; tip: 'uživo' | 'online'; obukaId: string } | null = null;

    for (const ob of matches) {
      const u = ob.ucesnici.find(participant => participant.pid === pid);
      if (u) {
        if (!best || u.status === 'prisustvovao' || (best.status !== 'prisustvovao' && u.status === 'nije prisustvovao')) {
          best = {
            status: u.status,
            date: ob.datum,
            tip: ob.tip,
            obukaId: ob.id
          };
        }
      }
    }

    return best;
  };

  // Render a dropdown inside cells for easy instant scheduling/editing
  const renderTrainingCell = (pid: string, type: 'kontrolor' | 'vdv' | 'call' | 'sefBM' | 'mt') => {
    const info = getTrainingStatus(pid, type);

    // Find latest scheduled training of this type
    const matches = obuke.filter(o => {
      const name = o.naziv.toLowerCase();
      if (type === 'kontrolor') return name.includes('kontrolor');
      if (type === 'vdv') return name.includes('vdv');
      if (type === 'call') return name.includes('call') || name.includes('kol') || name.includes('centar');
      if (type === 'sefBM') return name.includes('sef') || name.includes('šef') || (name.includes('bm') && name.includes('šef')) || name.includes('šefove');
      if (type === 'mt') return name.includes('mt') || name.includes('mobilni') || name.includes('mobilni tim');
      return false;
    });

    const latestTrainingId = matches[matches.length - 1]?.id || '';
    const value = info ? info.status : 'none';

    return (
      <div className="flex flex-col gap-1">
        <select
          value={value}
          disabled={isReadOnly && !allowScheduleObuka}
          onChange={(e) => {
            const val = e.target.value;
            if (val === 'none') {
              if (info) {
                onUpdateAttendance(info.obukaId, pid, 'nije prisustvovao');
              }
            } else {
              let obukaIdToUse = latestTrainingId;
              if (!obukaIdToUse) {
                // Auto create standard training for today
                let defaultNaziv = "Obuka za vdv";
                if (type === 'kontrolor') defaultNaziv = "Obuka za kontrolore";
                if (type === 'call') defaultNaziv = "Obuka za call centar";
                if (type === 'sefBM') defaultNaziv = "Obuka za šefove BM";
                if (type === 'mt') defaultNaziv = "Obuka za MT";

                const todayStr = new Date().toISOString().split('T')[0];
                const nextId = `OB-${obuke.length + 1}-${Math.floor(Math.random() * 900 + 100)}`;
                
                onAddObuka({
                  id: nextId,
                  naziv: defaultNaziv,
                  tip: 'uživo',
                  datum: todayStr,
                  ucesnici: [{ pid, status: val as any, komentar: '' }]
                });
                return;
              }
              onUpdateAttendance(obukaIdToUse, pid, val as any);
            }
          }}
          className={`px-2 py-1 rounded-xl text-[11px] font-bold border outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer w-full max-w-[150px] transition-all ${
            value === 'prisustvovao' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' :
            value === 'nije prisustvovao' ? 'bg-red-500/10 border-red-500/30 text-red-400' :
            value === 'pozvan' ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' :
            'bg-[#161a22] border-[#232935] text-gray-500 hover:border-gray-600'
          }`}
        >
          <option value="none" className="bg-[#101318] text-gray-500">— Nije upisan</option>
          <option value="pozvan" className="bg-[#101318] text-amber-400">🟡 Pozvan</option>
          <option value="prisustvovao" className="bg-[#101318] text-emerald-400">🟢 Prisustvovao</option>
          <option value="nije prisustvovao" className="bg-[#101318] text-red-400">🔴 Nije bio</option>
        </select>

        {info && (
          <span className="text-[9px] text-[#9aa3b2] font-semibold pl-1">
            {info.date} • <span className="capitalize">{info.tip}</span>
          </span>
        )}
      </div>
    );
  };

  // Filtered people for the main table
  const filteredPeople = people.filter(p => {
    const q = searchQuery.toLowerCase().trim();
    if (!q) return true;
    return (
      p.imePrezime.toLowerCase().includes(q) ||
      (p.uloga && p.uloga.toLowerCase().includes(q)) ||
      (p.reon && p.reon.toLowerCase().includes(q))
    );
  });

  return (
    <div className="space-y-6">
      {/* Sub-tab Navigation Switcher */}
      <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 p-4 bg-[#101318] border border-[#1e222b] rounded-2xl">
        <div className="flex items-center gap-2">
          {!hideTableView && (
            <button
              onClick={() => setViewMode('tabela')}
              className={`px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 transition-all cursor-pointer ${
                viewMode === 'tabela'
                  ? 'bg-blue-600/10 border border-blue-500/30 text-blue-400 font-bold'
                  : 'bg-transparent border border-transparent text-[#9aa3b2] hover:text-white'
              }`}
            >
              <Table className="w-4 h-4" />
              <span>Tabela polaznika i obuka</span>
            </button>
          )}
          
          <button
            onClick={() => setViewMode('evidencija')}
            className={`px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 transition-all cursor-pointer ${
              viewMode === 'evidencija'
                ? 'bg-blue-600/10 border border-blue-500/30 text-blue-400 font-bold'
                : 'bg-transparent border border-transparent text-[#9aa3b2] hover:text-white'
            }`}
          >
            <BookOpen className="w-4 h-4" />
            <span>Organizacija i evidencija obuka</span>
          </button>
        </div>

        <div className="flex items-center gap-3">
          {hasLocalColumnToggle && (
            <div className="relative">
              <button
                type="button"
                onClick={() => setIsColumnDropdownOpen((prev) => !prev)}
                className={`p-2 rounded-lg hover:bg-[#1e222b] text-gray-400 hover:text-white transition-all cursor-pointer inline-flex items-center justify-center ${
                  isColumnDropdownOpen ? 'bg-blue-600/20 text-blue-400 border border-blue-500/25' : 'border border-transparent'
                }`}
                title="Izbor kolona"
              >
                <Pin size={16} className="rotate-45" />
              </button>

              {isColumnDropdownOpen && (
                <div
                  onClick={(e) => e.stopPropagation()}
                  className="absolute right-0 top-full mt-2 w-64 bg-[#171a21] border border-[#2a2f3a] rounded-xl shadow-2xl p-3.5 z-40 text-left font-sans"
                >
                  <div className="flex justify-between items-center pb-2 mb-2 border-b border-[#1e222b]">
                    <span className="font-extrabold text-[#9aa3b2] uppercase tracking-wider text-[10px]">Prikaz kolona</span>
                    <button
                      type="button"
                      onClick={() => setIsColumnDropdownOpen(false)}
                      className="text-gray-400 hover:text-white text-[10px] bg-[#1e222b] hover:bg-[#252b36] px-2 py-0.5 rounded transition-all cursor-pointer"
                    >
                      Zatvori
                    </button>
                  </div>
                  <div className="space-y-1 max-h-60 overflow-y-auto pr-1">
                    {Object.entries(trainingColumnLabels)
                      .filter(([key]) => Object.keys(defaultVisibleTrainingColumns).includes(key))
                      .map(([key, label]) => {
                        const visible = visibleTrainingColumns[key];
                        return (
                          <button
                            key={key}
                            type="button"
                            onClick={() => toggleTrainingColumn(key)}
                            className="w-full flex items-center gap-2.5 px-2 py-1.5 hover:bg-[#1e222b] rounded-lg text-left transition-colors text-gray-200 cursor-pointer group/col"
                          >
                            <div className={`w-4 h-4 rounded border flex items-center justify-center transition-all ${
                              visible ? 'bg-blue-600 border-blue-500 text-white' : 'border-gray-600 bg-transparent group-hover/col:border-gray-400'
                            }`}>
                              {visible && <Check size={11} strokeWidth={3} />}
                            </div>
                            <span className="font-medium text-xs">{label}</span>
                          </button>
                        );
                      })}
                  </div>
                </div>
              )}
            </div>
          )}
          {allowScheduleObuka && (
            <button
              onClick={() => setIsModalOpen(true)}
              className="px-4 py-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-xs font-semibold text-white rounded-xl flex items-center gap-1.5 transition-colors cursor-pointer shadow-sm"
            >
              <Plus className="w-4 h-4" />
              <span>Zakaži novu obuku</span>
            </button>
          )}
        </div>
      </div>

      {/* VIEW MODE 1: TABULAR OVERVIEW */}
      {viewMode === 'tabela' && (
        <div className="space-y-4">
          {/* Search bar inside view */}
          <div className="flex items-center gap-3 p-4 bg-[#101318] border border-[#1e222b] rounded-2xl">
            <div className="relative flex-1">
              <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-500 pointer-events-none">
                <Search className="w-4 h-4" />
              </span>
              <input
                type="text"
                placeholder="Pretraži polaznike po imenu, ulozi ili reonu..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full pl-9 pr-4 py-2 text-xs bg-[#0c0e12] border border-[#1e222b] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
              />
              {searchQuery && (
                <button
                  type="button"
                  onClick={() => setSearchQuery('')}
                  className="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-white"
                >
                  <X className="w-4 h-4" />
                </button>
              )}
            </div>
            <div className="text-[11px] text-[#9aa3b2] font-semibold hidden md:block">
              Ukupno: <strong className="text-white">{filteredPeople.length}</strong> polaznika
            </div>
          </div>

          {/* Table Container */}
          <div className="bg-[#101318] border border-[#1e222b] rounded-2xl overflow-hidden shadow-sm">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse text-xs">
                <thead>
                  <tr className="border-b border-[#1e222b] text-[#9aa3b2] bg-[#0c0e12]">
                    <th className="p-3.5 font-bold text-white">Ime i prezime</th>
                    <th className="p-3.5 font-bold text-white">Uloga</th>
                    {trainingTypes.includes('kontrolor') && isTrainingColumnVisible('obuka_kontrolor') && (
                      <th className="p-3.5 font-bold text-white">Obuka za kontrolora</th>
                    )}
                    {trainingTypes.includes('vdv') && isTrainingColumnVisible('obuka_vdv') && (
                      <th className="p-3.5 font-bold text-white">Obuka za vdv</th>
                    )}
                    {trainingTypes.includes('call') && isTrainingColumnVisible('obuka_call') && (
                      <th className="p-3.5 font-bold text-white">Obuka za call centar</th>
                    )}
                    {trainingTypes.includes('sefBM') && isTrainingColumnVisible('obuka_sefBM') && (
                      <th className="p-3.5 font-bold text-white">Obuka za šefove BM</th>
                    )}
                    {trainingTypes.includes('mt') && isTrainingColumnVisible('obuka_mt') && (
                      <th className="p-3.5 font-bold text-white">Obuka za MT</th>
                    )}
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#1e222b]/50">
                  {filteredPeople.length === 0 ? (
                    <tr>
                      <td colSpan={2 + trainingTypes.reduce((acc, t) => acc + (isColumnVisible(
                        t === 'kontrolor' ? 'obuka_kontrolor' : t === 'vdv' ? 'obuka_vdv' : t === 'call' ? 'obuka_call' : t === 'sefBM' ? 'obuka_sefBM' : 'obuka_mt'
                      ) ? 1 : 0), 0)} className="p-12 text-center text-[#9aa3b2] italic">
                        Nema pronađenih polaznika za upisani kriterijum.
                      </td>
                    </tr>
                  ) : (
                    filteredPeople.map((p) => (
                      <tr
                        key={p.id}
                        className="group hover:bg-[#161a22]/80 transition-all duration-150"
                      >
                        <td className="p-3.5 font-semibold text-white font-sans">
                          <div className="flex flex-col">
                            <span className="font-semibold text-white group-hover:text-blue-400 transition-colors">
                              {p.imePrezime}
                            </span>
                            <span className="text-[10px] text-gray-500 mt-0.5">{p.reon}</span>
                          </div>
                        </td>
                        <td className="p-3.5 text-gray-300 capitalize">
                          <span className="px-2 py-0.5 rounded-lg bg-white/5 border border-white/10 text-[10px] font-bold text-gray-400">
                            {p.uloga || 'Bez uloge'}
                          </span>
                        </td>
                        {trainingTypes.includes('kontrolor') && isTrainingColumnVisible('obuka_kontrolor') && (
                          <td className="p-3.5">{renderTrainingCell(p.id, 'kontrolor')}</td>
                        )}
                        {trainingTypes.includes('vdv') && isTrainingColumnVisible('obuka_vdv') && (
                          <td className="p-3.5">{renderTrainingCell(p.id, 'vdv')}</td>
                        )}
                        {trainingTypes.includes('call') && isTrainingColumnVisible('obuka_call') && (
                          <td className="p-3.5">{renderTrainingCell(p.id, 'call')}</td>
                        )}
                        {trainingTypes.includes('sefBM') && isTrainingColumnVisible('obuka_sefBM') && (
                          <td className="p-3.5">{renderTrainingCell(p.id, 'sefBM')}</td>
                        )}
                        {trainingTypes.includes('mt') && isTrainingColumnVisible('obuka_mt') && (
                          <td className="p-3.5">{renderTrainingCell(p.id, 'mt')}</td>
                        )}
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* VIEW MODE 2: DETAILED SESSIONS / WORKFLOW VIEW */}
      {viewMode === 'evidencija' && (
        <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
          {/* Left Column: Course Schedule List */}
          <div className="xl:col-span-4 space-y-4">
            <h3 className="text-sm font-semibold text-white flex items-center gap-1.5">
              <GraduationCap className="w-4.5 h-4.5 text-blue-400" />
              <span>Evidencija obuka</span>
            </h3>

            {obuke.length === 0 ? (
              <div className="p-8 text-center bg-[#101318] border border-[#1e222b] rounded-2xl text-xs text-[#9aa3b2] italic">
                Nema evidentiranih obuka.
              </div>
            ) : (
              <div className="space-y-2">
                {obuke.map((o) => {
                  const countAttended = o.ucesnici.filter(u => u.status === 'prisustvovao').length;
                  const isSelected = o.id === selectedObukaId;

                  return (
                    <div
                      key={o.id}
                      onClick={() => setSelectedObukaId(o.id)}
                      className={`p-4 rounded-xl border text-left cursor-pointer transition-all ${
                        isSelected
                          ? 'bg-[#1b202a] border-[#3b82f6]/40 text-white'
                          : 'bg-[#101318] border-[#1e222b] text-gray-300 hover:bg-[#15181e] hover:border-[#2a303d]'
                      }`}
                    >
                      <div className="flex justify-between items-start gap-2">
                        <span className="text-[10px] font-bold uppercase tracking-wider bg-white/5 border border-white/10 px-2 py-0.5 rounded-md">
                          {o.tip}
                        </span>
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] text-gray-400 flex items-center gap-1 font-semibold">
                            <Calendar className="w-3 h-3" />
                            {o.datum}
                          </span>
                          {!isReadOnly && (
                            <button
                              type="button"
                              onClick={(e) => {
                                e.stopPropagation();
                                if (confirm(`Da li ste sigurni da želite da obrišete obuku "${o.naziv}"?`)) {
                                  onDeleteObuka(o.id);
                                  const remaining = obuke.filter(item => item.id !== o.id);
                                  if (remaining.length > 0) {
                                    setSelectedObukaId(remaining[0].id);
                                  } else {
                                    setSelectedObukaId('');
                                  }
                                }
                              }}
                              className="text-red-400 hover:text-red-300 p-1 rounded hover:bg-red-500/10 transition-colors cursor-pointer"
                              title="Obriši obuku"
                            >
                              <Trash2 className="w-3.5 h-3.5" />
                            </button>
                          )}
                        </div>
                      </div>
                      <h4 className="text-xs font-semibold mt-2.5 line-clamp-1">{o.naziv}</h4>
                      <div className="mt-2 text-[10px] text-[#9aa3b2] flex justify-between items-center">
                        <span>Pozvano: <strong className="text-white">{o.ucesnici.length}</strong></span>
                        <span>Prisutno: <strong className="text-emerald-400">{countAttended}</strong></span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Right Column: Active Prozivnik (Attendance tracker) */}
          <div className="xl:col-span-8 space-y-4">
            {selectedObuka ? (
              <div className="p-6 bg-[#101318] border border-[#1e222b] rounded-2xl space-y-4">
                {/* Header info */}
                <div className="border-b border-[#1e222b] pb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                  <div>
                    <h3 className="text-sm font-semibold text-white">{selectedObuka.naziv}</h3>
                    <p className="text-[11px] text-[#9aa3b2] mt-0.5">
                      Tip: <span className="text-white font-medium capitalize">{selectedObuka.tip}</span> | Datum obuke:{' '}
                      <span className="text-white font-medium">{selectedObuka.datum}</span>
                    </p>
                  </div>
                </div>

                {/* Attendance sheet */}
                {selectedObuka.ucesnici.length === 0 ? (
                  <div className="py-12 text-center text-xs text-[#9aa3b2] italic">
                    Nema pozvanih učesnika na ovu obuku.
                  </div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse text-xs">
                      <thead>
                        <tr className="border-b border-[#1e222b] text-[#9aa3b2]">
                          <th className="pb-3 font-semibold">Učesnik (Ime i prezime)</th>
                          <th className="pb-3 font-semibold">Telefon</th>
                          <th className="pb-3 font-semibold">Status prisustva</th>
                          <th className="pb-3 font-semibold">Komentar / Beleška</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-[#1e222b]/50">
                        {selectedObuka.ucesnici.map((u) => {
                          const personObj = people.find(p => p.id === u.pid);
                          if (!personObj) return null;

                          return (
                            <tr key={u.pid} className="text-gray-300">
                              <td className="py-3 font-medium text-white">{personObj.imePrezime}</td>
                              <td className="py-3 text-[11px] text-[#9aa3b2]">{personObj.telefon}</td>
                              
                              {/* Attendance Status Picker */}
                              <td className="py-3">
                                <div className="flex gap-1">
                                  {/* Pozvan */}
                                  <button
                                    type="button"
                                    disabled={isReadOnly}
                                    onClick={() => onUpdateAttendance(selectedObuka.id, u.pid, 'pozvan', u.komentar)}
                                    className={`px-2 py-1 rounded text-[10px] font-bold border transition-colors cursor-pointer ${
                                      u.status === 'pozvan'
                                        ? 'bg-amber-500/10 border-amber-500/30 text-amber-400'
                                        : 'bg-[#161a22]/50 border-transparent text-[#9aa3b2] hover:bg-white/5'
                                    }`}
                                  >
                                    Pozvan
                                  </button>

                                  {/* Prisustvovao */}
                                  <button
                                    type="button"
                                    disabled={isReadOnly}
                                    onClick={() => onUpdateAttendance(selectedObuka.id, u.pid, 'prisustvovao', u.komentar)}
                                    className={`px-2 py-1 rounded text-[10px] font-bold border transition-colors cursor-pointer ${
                                      u.status === 'prisustvovao'
                                        ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400'
                                        : 'bg-[#161a22]/50 border-transparent text-[#9aa3b2] hover:bg-white/5'
                                    }`}
                                  >
                                    Prisustvovao
                                  </button>

                                  {/* Nije prisustvovao */}
                                  <button
                                    type="button"
                                    disabled={isReadOnly}
                                    onClick={() => onUpdateAttendance(selectedObuka.id, u.pid, 'nije prisustvovao', u.komentar)}
                                    className={`px-2 py-1 rounded text-[10px] font-bold border transition-colors cursor-pointer ${
                                      u.status === 'nije prisustvovao'
                                        ? 'bg-red-500/10 border-red-500/30 text-red-400'
                                        : 'bg-[#161a22]/50 border-transparent text-[#9aa3b2] hover:bg-white/5'
                                    }`}
                                  >
                                    Nije bio
                                  </button>
                                </div>
                              </td>

                              {/* Comment box */}
                              <td className="py-3">
                                <input
                                  type="text"
                                  disabled={isReadOnly}
                                  placeholder="Dodaj komentar..."
                                  value={u.komentar || ''}
                                  onChange={(e) => onUpdateAttendance(selectedObuka.id, u.pid, u.status, e.target.value)}
                                  className="w-full bg-[#161a22] border border-[#232935] px-2 py-1 rounded text-[11px] text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                                />
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

                Odaberite obuku sa leve strane da vidite prozivnik i vodite evidenciju prisustva.

            )}
          </div>
        </div>

      {/* Add Training Modal */}
      {isModalOpen && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4 animate-fade-in">

            <div className="px-6 py-4 border-b border-[#1e222b] flex justify-between items-center">

              <button 
                onClick={() => setIsModalOpen(false)}
                className="text-gray-400 hover:text-white p-1 rounded-lg hover:bg-white/5 cursor-pointer"
              >
                <X className="w-4 h-4" />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="p-6 space-y-4">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider block">Naziv / Tema obuke</label>

                    onChange={(e) => setNaziv(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer"

                    {trainingTypes.map((t) => {

                      if (t === 'sefBM') return <option key={t} value="Obuka za šefove BM">Obuka za šefove BM</option>;
                      if (t === 'mt') return <option key={t} value="Obuka za MT">Obuka za MT</option>;

// ===== components/ECanvasserTab.tsx =====
interface ECanvasserTabProps {
  onNotify: (msg: string) => void;
  selectedOpstina?: string;
}

interface BMStat {
  bm: string;
  pokucano: number;
  podrska: number;
  protiv: number;
  neodluceni: number;
}

function ECanvasserTab({ onNotify, selectedOpstina = 'Vračar' }: ECanvasserTabProps) {
  const [data, setData] = useState<BMStat[]>(() => {
    const opstina = selectedOpstina;
    const suffix = opstina === 'Vračar' ? '' : `_${opstina.toLowerCase().replace(/\s+/g, '_')}`;
    const saved = localStorage.getItem(`struktura_ecanvasser${suffix}`);
    return saved ? JSON.parse(saved) : getInitialEcanvasserForOpstina(opstina);
  });

  React.useEffect(() => {
    const opstina = selectedOpstina;
    const suffix = opstina === 'Vračar' ? '' : `_${opstina.toLowerCase().replace(/\s+/g, '_')}`;
    const saved = localStorage.getItem(`struktura_ecanvasser${suffix}`);
    setData(saved ? JSON.parse(saved) : getInitialEcanvasserForOpstina(opstina));
  }, [selectedOpstina]);

  const [simulating, setSimulating] = useState(false);

  // Totals
  const totalVisited = data.reduce((sum, d) => sum + d.pokucano, 0);
  const totalSupport = data.reduce((sum, d) => sum + d.podrska, 0);
  const totalAgainst = data.reduce((sum, d) => sum + d.protiv, 0);
  const totalUndecided = data.reduce((sum, d) => sum + d.neodluceni, 0);

  const overallSupportRate = totalVisited > 0 ? Math.round((totalSupport / totalVisited) * 100) : 0;
  const targetGoalPercentage = Math.min(100, Math.round((totalVisited / 2500) * 100)); // Target 2500 doors

  // Save helper
  const updateData = (newData: BMStat[]) => {
    setData(newData);
    const opstina = selectedOpstina;
    const suffix = opstina === 'Vračar' ? '' : `_${opstina.toLowerCase().replace(/\s+/g, '_')}`;
    localStorage.setItem(`struktura_ecanvasser${suffix}`, JSON.stringify(newData));
  };

  const handleSimulateKnocking = () => {
    setSimulating(true);
    
    setTimeout(() => {
      // Add random numbers to each neighborhood
      const updated = data.map(d => {
        const addedDoors = Math.floor(Math.random() * 15 + 5);
        const addedSupport = Math.floor(addedDoors * (Math.random() * 0.3 + 0.4)); // 40%-70% support
        const addedAgainst = Math.floor((addedDoors - addedSupport) * (Math.random() * 0.4 + 0.2)); 
        const addedUndecided = addedDoors - addedSupport - addedAgainst;

        return {
          ...d,
          pokucano: d.pokucano + addedDoors,
          podrska: d.podrska + addedSupport,
          protiv: d.protiv + addedAgainst,
          neodluceni: d.neodluceni + addedUndecided
        };
      });

      updateData(updated);
      setSimulating(false);
      onNotify('Simulacija uspešno završena! Evidentirani novi razgovori na terenu.');
    }, 1200);
  };

  const handleReset = () => {
    if (confirm('Da li želite resetovati podatke terenskog rada na fabrička podešavanja?')) {
      updateData(getInitialEcanvasserForOpstina(selectedOpstina));
      onNotify('Podaci terenskog rada su resetovani.');
    }
  };

  return (
    <div className="space-y-6">
      {/* Simulation action card */}
      <div className="p-6 bg-gradient-to-r from-[#101318] to-[#1d1b10] border border-amber-500/10 rounded-2xl flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div className="space-y-1">
          <div className="flex items-center gap-2 text-sm font-semibold text-amber-400">
            <Zap className="w-4 h-4 fill-current" />
            <span>Terenska door-to-door kampanja (eCanvasser)</span>
          </div>
          <p className="text-xs text-[#9aa3b2] max-w-xl">
            Praćenje raspoloženja birača na terenu opštine {selectedOpstina} u realnom vremenu. Pokrenite interaktivnu simulaciju kucanja kako biste iskusili doprinos volontera.
          </p>
        </div>

        <div className="flex items-center gap-2 flex-shrink-0">
          <button
            onClick={handleReset}
            className="p-2 bg-[#161a22] hover:bg-[#232935] border border-[#232935] text-gray-400 hover:text-white rounded-xl text-xs transition-colors flex items-center gap-1.5"
            title="Resetuj podatke"
          >
            <RefreshCw className="w-3.5 h-3.5" />
          </button>
          
          <button
            onClick={handleSimulateKnocking}
            disabled={simulating}
            className="px-4 py-2 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-xs font-bold text-[#0c0e12] rounded-xl shadow-md transition-all flex items-center gap-1.5"
          >
            {simulating ? (
              <>
                <RefreshCw className="w-4 h-4 animate-spin text-[#0c0e12]" />
                Simulacija u toku...
              </>
            ) : (
              <>
                <Sparkles className="w-4 h-4 text-[#0c0e12] fill-current" />
                Simuliraj rad na terenu
              </>
            )}
          </button>
        </div>
      </div>

      {/* Metrics Cards */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {/* Doors Visit */}
        <div className="p-5 bg-[#101318] border border-[#1e222b] rounded-2xl">

                      </div>

            </tbody>
