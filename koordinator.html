  tailwind.config = {
    darkMode: ['selector', '[data-theme="dark"]'],

      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],

<style>

:root {
  --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  color-scheme: dark;
  --app-bg: #090b0f;
  --surface: #0c0e12;
  --surface-strong: #101318;
  --surface-muted: #161a22;
  --border: #1e222b;
  --text-primary: #f5f7fb;
  --text-secondary: #9aa3b2;
  --text-muted: #6b7280;
}

:root[data-theme='light'] {
  color-scheme: light;
  --app-bg: #eef4fb;
  --surface: #ffffff;
  --surface-strong: #fdfdff;
  --surface-muted: #f3f7ff;
  --border: #dce4ef;
  --text-primary: #0f172a;
  --text-secondary: #4f5f7a;
  --text-muted: #718096;
  --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
}

html, body, #root { min-height: 100%; }

body {
  margin: 0;
  font-family: var(--font-sans);
  background-color: var(--app-bg);
  color: var(--text-primary);
  transition: background-color 0.2s ease, color 0.2s ease;
}

:root[data-theme='light'] [class*="bg-[#"] {
  background-color: var(--surface) !important;
  box-shadow: var(--shadow-soft) !important;
}
:root[data-theme='light'] [class*="border-[#"] {
  border-color: var(--border) !important;
}
:root[data-theme='light'] .border-\[\#1e222b\],
:root[data-theme='light'] .border-\[\#232935\],
:root[data-theme='light'] .border-\[\#2a303d\],
:root[data-theme='light'] .border-\[\#2a2f3a\] {
  border-color: var(--border) !important;
}
:root[data-theme='light'] .text-white,
:root[data-theme='light'] .text-gray-100,
:root[data-theme='light'] .text-gray-50 {
  color: var(--text-primary) !important;
}
:root[data-theme='light'] .hover\:bg-white\/5:hover,
:root[data-theme='light'] .hover\:bg-white\/2:hover {
  background-color: var(--surface-muted) !important;
}
:root[data-theme='light'] .text-\[\#9aa3b2\],
:root[data-theme='light'] .text-gray-200,
:root[data-theme='light'] .text-gray-300,
:root[data-theme='light'] .text-gray-400,
:root[data-theme='light'] .text-gray-500 {
  color: var(--text-secondary) !important;
}
:root[data-theme='light'] .text-gray-600,
:root[data-theme='light'] .text-gray-700,
:root[data-theme='light'] .text-gray-800,
:root[data-theme='light'] .text-slate-900 {
  color: var(--text-primary) !important;
}

</style>
</head>
<body>

<div id="pwGate" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:'Inter',ui-sans-serif,system-ui,sans-serif">
  <div style="width:100%;max-width:360px;margin:0 20px;background:#1e293b;border:1px solid #334155;border-radius:16px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.45)">
    <h1 style="margin:0 0 6px;color:#f1f5f9;font-size:20px;font-weight:700;text-align:center">Koordinator</h1>
    <p style="margin:0 0 20px;color:#94a3b8;font-size:13px;text-align:center">Unesite lozinku za pristup</p>
    <form id="pwForm" autocomplete="off">
      <input id="pwInput" type="password" placeholder="Lozinka" autofocus
        style="width:100%;box-sizing:border-box;padding:12px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:15px;outline:none" />
      <p id="pwError" style="display:none;margin:10px 0 0;color:#f87171;font-size:13px;text-align:center">Pogrešna lozinka</p>
      <button type="submit"
        style="width:100%;margin-top:16px;padding:12px;border:none;border-radius:10px;background:#6366f1;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Uđi</button>
    </form>
  </div>
</div>
<script>
(function () {
  var PASSWORD = 'prijomoja';
  var KEY = 'koordinator_unlocked';
  var gate = document.getElementById('pwGate');
  function unlock() { gate.parentNode.removeChild(gate); document.body.style.overflow = ''; }
  if (sessionStorage.getItem(KEY) === '1') { unlock(); return; }
  document.body.style.overflow = 'hidden';
  document.getElementById('pwForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var val = document.getElementById('pwInput').value;
    if (val === PASSWORD) { sessionStorage.setItem(KEY, '1'); unlock(); }
    else {
      document.getElementById('pwError').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  });
})();
</script>

function getReoniForOpstina(opstina: string): string[] {
  return OPSTINA_REONI[opstina] || OPSTINA_REONI['Vračar'];
}

function mapReon(reon: string, targetOpstina: string): string {
  const vracarList = OPSTINA_REONI['Vračar'];
  const targetList = OPSTINA_REONI[targetOpstina] || vracarList;
  const idx = vracarList.indexOf(reon);
  if (idx !== -1 && targetList[idx]) {
    return targetList[idx];
  }
  return targetList[0] || reon;
}

function getInitialPeopleForOpstina(opstina: string): Person[] {
  if (opstina === 'Vračar') return INITIAL_PEOPLE;
  return INITIAL_PEOPLE.map(p => ({
    ...p,
    reon: mapReon(p.reon, opstina)
  }));
}

function getInitialPendingForOpstina(opstina: string): PendingPerson[] {
  if (opstina === 'Vračar') return INITIAL_PENDING;
  return INITIAL_PENDING.map(p => ({
    ...p,
    reon: mapReon(p.reon, opstina)
  }));
}

function getInitialBmForOpstina(opstina: string): BirackoMesto[] {
  if (opstina === 'Vračar') return INITIAL_BM;
  return INITIAL_BM.map(b => {
    let mappedNaziv = b.naziv;
    if (b.naziv.includes('Vračar')) {
      mappedNaziv = b.naziv.replace('Vračar', opstina);

    return {

      naziv: mappedNaziv,
      reon: mapReon(b.reon, opstina)
    };

}

function getInitialMtForOpstina(opstina: string): MobilniTim[] {

  }));

function getInitialFinansijeForOpstina(opstina: string): FinansijskaStavka[] {
  if (opstina === 'Vračar') return INITIAL_FINANSIJE;
  return INITIAL_FINANSIJE.map(f => {

// ===== ExcelHelper.ts =====
const XLSX = window.XLSX;

// Human-readable headers for export and matching for import
const HEADER_MAPPING: { [key: string]: string } = {
  imePrezime: 'Ime i prezime',
  uloga: 'Uloga',
  status: 'Status',
  faza: 'Faza',
  bm: 'BM',
  telefon: 'Telefon',
  email: 'Email',
  auto: 'Poseduje auto (Da/Ne)',
  iskustvo: 'Iskustvo na izborima (Da/Ne)',
  obukaOsnovna: 'Završen osnovni trening (Da/Ne)',
  obukaNapredna: 'Završen napredni trening (Da/Ne)',
  rasporedjen: 'Raspoređen (Da/Ne)',
  napomene: 'Napomene',
  poreklo: 'Poreklo',
  odPoverenja: 'Osoba od poverenja (Da/Ne)'
};

// Reverse mapping for parsing imports
const REVERSE_HEADER_MAPPING: { [key: string]: string } = {};
Object.entries(HEADER_MAPPING).forEach(([key, value]) => {
  REVERSE_HEADER_MAPPING[value.toLowerCase().trim()] = key;
});

function exportToExcel(people: Person[], customFields: CustomField[]) {
  // Format data for export
  const exportData = people.map((p) => {
    const row: { [key: string]: any } = {};
    
    // Core fields
    row[HEADER_MAPPING.imePrezime] = p.imePrezime || '';
    row[HEADER_MAPPING.uloga] = p.uloga || '';
    row[HEADER_MAPPING.status] = p.status || '';
    row[HEADER_MAPPING.faza] = p.faza || '';
    row[HEADER_MAPPING.bm] = p.bm || '';
    row[HEADER_MAPPING.telefon] = p.telefon || '';
    row[HEADER_MAPPING.email] = p.email || '';
    row[HEADER_MAPPING.auto] = p.auto ? 'Da' : 'Ne';
    row[HEADER_MAPPING.iskustvo] = p.iskustvo ? 'Da' : 'Ne';
    row[HEADER_MAPPING.obukaOsnovna] = p.obukaOsnovna ? 'Da' : 'Ne';
    row[HEADER_MAPPING.obukaNapredna] = p.obukaNapredna ? 'Da' : 'Ne';
    row[HEADER_MAPPING.rasporedjen] = p.rasporedjen ? 'Da' : 'Ne';
    row[HEADER_MAPPING.napomene] = p.napomene || '';
    row[HEADER_MAPPING.poreklo] = p.poreklo || '';
    row[HEADER_MAPPING.odPoverenja] = p.odPoverenja ? 'Da' : 'Ne';

    // Custom fields
    customFields.forEach((cf) => {
      row[cf.label] = p[cf.key] !== undefined ? p[cf.key] : '';
    });

    return row;
  });

  const worksheet = XLSX.utils.json_to_sheet(exportData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, 'Ljudi');

  // Generate buffer and trigger browser download
  XLSX.writeFile(workbook, `struktura_ljudi_izvoz_${new Date().toISOString().slice(0, 10)}.xlsx`);
}

function importFromExcel(file: File, customFields: CustomField[]): Promise<{ people: Partial<Person>[]; errors: string[] }> {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = (e) => {
      try {
        const data = e.target?.result;
        if (!data) {
          throw new Error('Nije moguće pročitati datoteku.');
        }

        const workbook = XLSX.read(data, { type: 'binary' });
        const firstSheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[firstSheetName];
        
        // Read sheet as JSON array with headers
        const rawRows = XLSX.utils.sheet_to_json<any>(worksheet);
        const importedPeople: Partial<Person>[] = [];
        const errors: string[] = [];

        rawRows.forEach((rawRow, idx) => {
          const rowNum = idx + 2; // Row number in sheet (1-based + 1 for header)
          const person: Partial<Person> = {
            id: `imported_${Date.now()}_${idx}_${Math.random().toString(36).substr(2, 4)}`,
            imePrezime: '',
            uloga: 'kontrolor',
            status: 'potencijalni',
            faza: '—',
            reon: '',
            bm: '',
            telefon: '',
            email: '',
            auto: false,
            iskustvo: false,
            obukaOsnovna: false,
            obukaNapredna: false,
            rasporedjen: false,
            napomene: '',
            poreklo: '',
            odPoverenja: false
          };

          // Map columns to fields
          Object.entries(rawRow).forEach(([colHeader, colValue]) => {
            const cleanedHeader = colHeader.toLowerCase().trim();
            const matchedField = REVERSE_HEADER_MAPPING[cleanedHeader];

            const valStr = String(colValue).trim();
            const isDa = valStr.toLowerCase() === 'da' || valStr.toLowerCase() === 'yes' || valStr === '1' || valStr.toLowerCase() === 'true';

            if (matchedField) {
              if (['auto', 'iskustvo', 'obukaOsnovna', 'obukaNapredna', 'rasporedjen', 'odPoverenja'].includes(matchedField)) {
                person[matchedField] = isDa;
              } else {
                person[matchedField] = valStr;
              }
            } else {
              // Check if it matches any custom field label
              const customField = customFields.find(cf => cf.label.toLowerCase().trim() === cleanedHeader);
              if (customField) {
                if (customField.type === 'boolean') {
                  person[customField.key] = isDa;
                } else if (customField.type === 'number') {
                  person[customField.key] = Number(valStr) || 0;
                } else {
                  person[customField.key] = valStr;
                }
              }
            }
          });

          // Validation
          if (!person.imePrezime) {
            errors.push(`Red ${rowNum}: Nedostaje obavezno polje "Ime i prezime".`);
            return;
          }
          if (!person.telefon) {
            errors.push(`Red ${rowNum}: Nedostaje obavezno polje "Telefon".`);
            return;
          }
          if (!person.email) {
            errors.push(`Red ${rowNum}: Nedostaje obavezno polje "Email".`);
            return;
          }

          importedPeople.push(person);
        });

        resolve({ people: importedPeople, errors });
      } catch (err: any) {
        reject(err.message || err);
      }
    };

    reader.onerror = () => {
      reject('Greška pri čitanju fajla.');
    };

    reader.readAsBinaryString(file);
  });
}

                          className="px-2 py-1 text-[10px] bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold transition-colors"
                        >
                          Da
                        </button>
                        <button
                          onClick={() => setConfirmDeleteKey(null)}
                          className="px-2 py-1 text-[10px] bg-[#1e222b] hover:bg-[#2a2f3a] text-gray-300 rounded-lg transition-colors"
                        >
                          Ne
                        </button>
                      </div>
                    ) : (
                      <button
                        onClick={() => setConfirmDeleteKey(cf.key)}
                        className="text-red-500 hover:text-white p-1.5 rounded-lg hover:bg-red-950/40 transition-colors shrink-0"
                        title="Obriši kolonu"
                      >
                        <Trash2 size={14} />
                      </button>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>

        </div>

        {/* Footer */}
        <div className="px-6 py-4 border-t border-[#2a2f3a] bg-[#1a1d26] flex justify-end rounded-b-2xl">
          <button
            onClick={onClose}
            className="text-xs text-gray-300 hover:text-white px-5 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 font-medium shadow-md transition-colors"
          >
            Završi
          </button>
        </div>

      </div>
    </div>
  );
}

// ===== components/PersonModal.tsx =====
interface PersonModalProps {
  person: Person | null; // null means adding a new person
  customFields: CustomField[];
  kontakti?: Kontakt[];
  obuke?: Obuka[];
  onSave: (person: Person) => void;
  onDelete?: (id: string) => void;
  onClose: () => void;
  isReadOnly?: boolean;
  reoni?: string[];
}

function PersonModal({
  person,
  customFields,
  kontakti = [],
  obuke = [],
  onSave,
  onDelete,
  onClose,
  isReadOnly = false,
  reoni = REONI
}: PersonModalProps) {
  const [isEditing, setIsEditing] = useState<boolean>(!person);
  const [selectedRoles, setSelectedRoles] = useState<string[]>([]);
  const [formData, setFormData] = useState<Partial<Person>>({
    imePrezime: '',
    uloga: '', // default empty (no uloga)
    status: AVAILABLE_STATUSES[2], // default "potencijalni"
    faza: '—',
    reon: reoni[0],
    bm: '',
    telefon: '',
    email: '',
    auto: false,
    iskustvo: false,
    obukaOsnovna: false,
    obukaNapredna: false,
    rasporedjen: false,
    napomene: '',
    telegram: '',
    kontaktPoint: '',
    poreklo: '',
    odPoverenja: false
  });

  useEffect(() => {
    if (person) {
      setFormData({ ...person });
      const roles = person.uloga ? person.uloga.split(',').map(r => r.trim()).filter(Boolean) : [];
      setSelectedRoles(roles);
      setIsEditing(false); // Default to detail view when opening an existing person
    } else {
      setFormData({
        imePrezime: '',
        uloga: '',
        status: AVAILABLE_STATUSES[2],
        faza: '—',
        reon: reoni[0],
        bm: '',
        telefon: '',
        email: '',
        auto: false,
        iskustvo: false,
        obukaOsnovna: false,
        obukaNapredna: false,
        rasporedjen: false,
        napomene: '',
        telegram: '',
        kontaktPoint: '',
        poreklo: '',
        odPoverenja: false
      });
      setSelectedRoles([]);
      setIsEditing(true); // Open directly in edit mode for new person
    }
  }, [person]);

  const handleRoleToggle = (role: string) => {
    let updated: string[];
    if (selectedRoles.includes(role)) {
      updated = selectedRoles.filter(r => r !== role);
    } else {
      updated = [...selectedRoles, role];
    }
    setSelectedRoles(updated);
    handleChange('uloga', updated.join(', '));
  };

  const handleChange = (key: keyof Person, value: any) => {
    setFormData((prev) => ({
      ...prev,
      [key]: value
    }));
  };

  const handleCustomFieldChange = (key: string, value: any) => {
    setFormData((prev) => ({
      ...prev,
      [key]: value
    }));
  };

  const handleSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (!formData.imePrezime?.trim()) {
      alert('Ime i prezime je obavezno polje.');
      return;
    }

    const savedPerson: Person = {
      id: person?.id || `person_${Date.now()}`,
      imePrezime: formData.imePrezime.trim(),
      uloga: selectedRoles.join(', '),
      status: formData.status || 'potencijalni',
      faza: formData.faza || '—',
      reon: formData.reon || '',
      bm: formData.bm || '',
      telefon: formData.telefon || '',
      email: formData.email || '',
      auto: !!formData.auto,
      iskustvo: !!formData.iskustvo,
      obukaOsnovna: !!formData.obukaOsnovna,
      obukaNapredna: !!formData.obukaNapredna,
      rasporedjen: !!formData.rasporedjen,
      napomene: formData.napomene || '',
      telegram: formData.telegram || '',
      kontaktPoint: formData.kontaktPoint || '',
      poreklo: formData.poreklo || '',
      odPoverenja: !!formData.odPoverenja
    };

    // Copy over all custom fields
    customFields.forEach((cf) => {
      savedPerson[cf.key] = formData[cf.key] !== undefined ? formData[cf.key] : '';
    });

    onSave(savedPerson);
  };

  // --------------------------------------------------------
  // DETAILS VIEW (When not editing and person is not null)
  // --------------------------------------------------------
  if (!isEditing && person) {
    // Find training status for this person
    const getTrainingStatus = (type: 'kontrolor' | 'vdv' | 'call') => {
      const matches = obuke.filter(o => {
        const name = o.naziv.toLowerCase();
        if (type === 'kontrolor') return name.includes('kontrolor');
        if (type === 'vdv') return name.includes('vdv');
        if (type === 'call') return name.includes('call') || name.includes('kol') || name.includes('centar');
        return false;
      });

      let best: { status: string; date?: string; tip?: string } | null = null;
      for (const t of matches) {
        const u = t.ucesnici.find(u => u.pid === person.id);
        if (u) {
          if (!best || u.status === 'prisustvovao' || (best.status !== 'prisustvovao' && u.status === 'nije prisustvovao')) {
            best = { status: u.status, date: t.datum, tip: t.tip };
          }
        }
      }
      return best ? best.status : 'nije pozvan';
    };

    const kontrolorStatus = getTrainingStatus('kontrolor');
    const vdvStatus = getTrainingStatus('vdv');
    const callStatus = getTrainingStatus('call');

    const personContacts = kontakti.filter((c) => c.pid === person.id);

    return (
      <div className="fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center z-50 p-4 overflow-y-auto">
        <div className="bg-[#171a21] border border-[#2a2f3a] rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl animate-in fade-in zoom-in-95 duration-200 font-sans">

            <div>
              <h2 className="text-xl font-extrabold text-white">
                {person.imePrezime}
              </h2>
              <p className="text-xs text-[#9aa3b2] mt-1">
                {person.uloga ? (
                  person.uloga.split(',').map(r => r.trim()).join(', ')
                ) : (
                  'Bez uloge (Samo kontakt)'
                )} <span className="mx-1.5 text-gray-600">•</span> glasa na BM {person.bm || '—'}
              </p>
            </div>
            <button
              onClick={onClose}
              className="text-gray-400 hover:text-white p-1 rounded-lg hover:bg-[#1e222b] transition-colors"
            >
              <X size={20} />
            </button>
          </div>

          {/* Body */}
          <div className="flex-1 overflow-y-auto p-8 space-y-6 text-left">
            
            {/* FAZA SECTION */}
            <div>
              <h3 className="text-[10px] font-bold text-gray-400 tracking-wider uppercase mb-3">

              <div className="flex flex-wrap gap-2.5">

// ===== components/DashboardTab.tsx =====
interface DashboardTabProps {
  people: Person[];
  bm: BirackoMesto[];
  mt: MobilniTim[];
  obuke: Obuka[];
  pending: PendingPerson[];
  selectedOpstina?: string;
}

function DashboardTab({ people, bm, mt, obuke, pending, selectedOpstina = 'Vračar' }: DashboardTabProps) {
  // --- High Level Calculations ---
  const totalPeople = people.length;
  const totalBM = bm.length;
  const activeMT = mt.length;

  const getOpstinaSuffix = (opstina: string) => {
    switch (opstina) {
      case 'Novi Beograd': return 'u NB';
      case 'Vračar': return 'na VR';
      case 'Stari grad': return 'u SG';
      case 'Savski venac': return 'u SV';
      case 'Zvezdara': return 'na ZV';
      case 'Palilula': return 'u PA';
      case 'Voždovac': return 'u VO';
      default: return `u ${opstina.toUpperCase()}`;
    }
  };
  
  const hasRole = (p: Person, roleName: string) => {
    if (!p.uloga) return false;
    return p.uloga.toLowerCase().split(',').map(r => r.trim()).includes(roleName.toLowerCase());
  };

  // Count unique people who attended at least one training
  const attendedUnique = new Set<string>();
  obuke.forEach(o => {
    o.ucesnici.forEach(u => {
      if (u.status === 'prisustvovao') {
        attendedUnique.add(u.pid);
      }
    });
  });
  const trainedVolunteers = attendedUnique.size;

  // Count controllers who are completely trained or completed online training
  const kompletonObuceniKontrolori = people.filter(p => {
    if (!hasRole(p, 'kontrolor')) return false;
    if (p.obukaOsnovna && p.obukaNapredna) return true;
    const attendedUzivo = obuke.some(o => 
      o.tip === 'uživo' && 
      o.ucesnici.some(u => u.pid === p.id && u.status === 'prisustvovao')
    );
    const attendedOnline = obuke.some(o => 
      o.tip === 'online' && 
      o.ucesnici.some(u => u.pid === p.id && u.status === 'prisustvovao')
    );
    return attendedUzivo && attendedOnline;
  }).length;

  const controllersWithOnline = people.filter(p => {
    if (!hasRole(p, 'kontrolor')) return false;
    const attendedOnline = obuke.some(o => 
      o.tip === 'online' && 
      o.ucesnici.some(u => u.pid === p.id && u.status === 'prisustvovao')
    );
    return attendedOnline || p.obukaNapredna;
  }).length;

  // Count leaders of polling stations
  const totalSefovi = people.filter(p => hasRole(p, 'šef BM')).length;
  const assignedSefovi = bm.filter(b => b.sefBM.length > 0).length;

  // Count controllers (inspectors)
  const totalKontrolori = people.filter(p => hasRole(p, 'kontrolor')).length;
  const assignedKontroloriSet = new Set<string>();
  bm.forEach(b => b.kontrolori.forEach(id => assignedKontroloriSet.add(id)));
  const assignedKontroloriCount = assignedKontroloriSet.size;

  // --- Team category counts (Kontrolna tabla team overview) ---
  const timVdvCount = people.filter(p => hasRole(p, 'vdv volonter')).length;
  const timCallCentarCount = people.filter(p => hasRole(p, 'cc operater')).length;
  const timLogistikaCount = people.filter(p => hasRole(p, 'logistika volonter')).length;

  // --- Funnel Counts ---
  const funnel = {
    pending: pending.length,
    contacted: people.filter(p => p.status === 'kontaktiran').length,
    confirmed: people.filter(p => p.status === 'potvrđen').length,
    assigned: people.filter(p => p.rasporedjen).length,
  };

  // --- Role Counts ---
  const roleCounts: { [key: string]: number } = {};
  people.forEach(p => {
    if (p.uloga) {
      const roles = p.uloga.split(',').map(r => r.trim()).filter(Boolean);
      if (roles.length > 0) {
        roles.forEach(r => {
          roleCounts[r] = (roleCounts[r] || 0) + 1;
        });
      } else {
        roleCounts['Bez uloge'] = (roleCounts['Bez uloge'] || 0) + 1;
      }
    } else {
      roleCounts['Bez uloge'] = (roleCounts['Bez uloge'] || 0) + 1;
    }
  });

  // --- Reon Coverage Analysis ---
  const reoniCoverage = Array.from(new Set(bm.map(b => b.reon))).map(reonName => {
    const bmInReon = bm.filter(b => b.reon === reonName);
    const totalSpots = bmInReon.length * 3; // 1 chief + 2 controllers
    const filledSefovi = bmInReon.filter(b => b.sefBM.length > 0).length;
    const filledKontrolori = bmInReon.reduce((sum, b) => sum + b.kontrolori.length, 0);
    const filledSpots = filledSefovi + filledKontrolori;
    const pct = totalSpots > 0 ? Math.round((filledSpots / totalSpots) * 100) : 0;
    return {
      reon: reonName,
      totalSpots,
      filledSpots,
      pct,
      bmCount: bmInReon.length,
      filledSefovi,
      filledKontrolori
    };
  }).sort((a, b) => b.pct - a.pct);

  const pctSefovi = totalBM > 0 ? Math.round((assignedSefovi / totalBM) * 100) : 0;
  const totalKontrolorSpots = totalBM * 2;
  const assignedKontroloriSpots = bm.reduce((sum, b) => sum + b.kontrolori.length, 0);

    if (r.includes('cc') || r.includes('operater') || r.includes('operator')) {

    if (r.includes('bez uloge')) {

        { id: 't2', text: 'Odštampati spiskove biračkih mesta', completed: true, priority: 'medium', dateAdded: '2026-06-22', addedBy: 'Kaluđer' },
        { id: 't3', text: 'Ažurirati Excel fajl sa finansijama', completed: false, priority: 'low', dateAdded: '2026-06-24', addedBy: 'Kaluđer' },
        { id: 't4', text: 'Pripremiti osveženje za sastanak u petak', completed: false, priority: 'low', dateAdded: '2026-06-24', addedBy: 'Kaluđer' }
      ];
      setTasks(defaultTasks);
      localStorage.setItem('vrasar_tasks', JSON.stringify(defaultTasks));
    }
  }, []);

  // --- Persist data ---
  const saveEventsToStorage = (newEvents: CalendarEvent[]) => {
    setEvents(newEvents);
    localStorage.setItem('vrasar_calendar_events', JSON.stringify(newEvents));
  };

  const saveTasksToStorage = (newTasks: Task[]) => {
    setTasks(newTasks);
    localStorage.setItem('vrasar_tasks', JSON.stringify(newTasks));
  };

  // --- Calendar Helpers ---
  const daysInMonth = (year: number, month: number) => new Date(year, month + 1, 0).getDate();
  const firstDayOfMonth = (year: number, month: number) => {
    const day = new Date(year, month, 1).getDay();
    return day === 0 ? 6 : day - 1;
  };

  const currentYear = currentDate.getFullYear();
  const currentMonth = currentDate.getMonth();

  const handlePrevMonth = () => {
    setCurrentDate(new Date(currentYear, currentMonth - 1, 1));
  };

  const handleNextMonth = () => {
    setCurrentDate(new Date(currentYear, currentMonth + 1, 1));
  };

  // Generate calendar grid array
  const totalDays = daysInMonth(currentYear, currentMonth);
  const startOffset = firstDayOfMonth(currentYear, currentMonth);
  
  const daysArray: (number | null)[] = [];
  for (let i = 0; i < startOffset; i++) {
    daysArray.push(null);
  }
  for (let d = 1; d <= totalDays; d++) {
    daysArray.push(d);
  }

  // Formatting date string
  const formatDateStr = (dayNum: number) => {
    const mm = String(currentMonth + 1).padStart(2, '0');
    const dd = String(dayNum).padStart(2, '0');
    return `${currentYear}-${mm}-${dd}`;
  };

  const monthNames = [
    'Januar', 'Februar', 'Mart', 'April', 'Maj', 'Jun',
    'Jul', 'Avgust', 'Septembar', 'Oktobar', 'Novembar', 'Decembar'
  ];

  // --- Event Handlers ---
  const handleAddEvent = (e: React.FormEvent) => {
    e.preventDefault();
    if (!selectedDateStr || !newEventText.trim()) return;

    const newEvent: CalendarEvent = {
      id: Date.now().toString(),
      date: selectedDateStr,
      text: newEventText.trim(),
      category: newEventCategory,
      addedBy: 'Kaluđer'
    };

    saveEventsToStorage([...events, newEvent]);
    setNewEventText('');
  };

  const handleDeleteEvent = (id: string) => {
    const filtered = events.filter(ev => ev.id !== id);
    saveEventsToStorage(filtered);
  };

  const handleStartEditEvent = (ev: CalendarEvent) => {
    setEditingEventId(ev.id);
    setEditingEventText(ev.text);
  };

  const handleSaveEditEvent = (id: string) => {
    const updated = events.map(ev => ev.id === id ? { ...ev, text: editingEventText } : ev);
    saveEventsToStorage(updated);
    setEditingEventId(null);
  };

  // --- Task Handlers ---
  const handleAddTask = (e: React.FormEvent) => {
    e.preventDefault();
    if (!newTaskText.trim()) return;

    const newTask: Task = {
      id: 't_' + Date.now().toString(),
      text: newTaskText.trim(),
      completed: false,
      priority: newTaskPriority,
      dateAdded: new Date().toISOString().split('T')[0],
      addedBy: 'Kaluđer'
    };

    saveTasksToStorage([...tasks, newTask]);
    setNewTaskText('');
    setNewTaskPriority('medium');
  };

  const handleToggleTask = (id: string) => {
    const updated = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
    saveTasksToStorage(updated);
  };

  const handleDeleteTask = (id: string) => {
    const filtered = tasks.filter(t => t.id !== id);
    saveTasksToStorage(filtered);
  };

  // Calculate task completions
  const completedCount = tasks.filter(t => t.completed).length;
  const totalTasksCount = tasks.length;
  const progressPercent = totalTasksCount > 0 ? Math.round((completedCount / totalTasksCount) * 100) : 0;

  return (
    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
      
      {/* LEVA KOLONA: INTERAKTIVNI KALENDAR (lg:col-span-8 na velikim ekranima) */}
      <div className="lg:col-span-8 space-y-4">
        <div className="p-6 bg-[#101318] border border-[#1e222b] rounded-2xl space-y-4">
          
          {/* Calendar Header with Navigation */}
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div className="flex items-center gap-2.5">
              <CalendarIcon className="w-5 h-5 text-blue-400" />
              <h3 className="text-sm font-bold text-white uppercase tracking-wide">
                Planer i Kalendar akcija
              </h3>
            </div>
            
            {/* Navigation buttons */}
            <div className="flex items-center gap-1 self-start sm:self-auto">
              <button
                onClick={handlePrevMonth}
                className="p-1.5 bg-[#161a22] hover:bg-white/5 border border-[#232935] text-gray-400 hover:text-white rounded-lg transition-colors"
                title="Prethodni mesec"
              >
                <ChevronLeft className="w-4 h-4" />
              </button>
              
              <span className="text-xs font-bold text-gray-200 px-3 py-1 bg-[#161a22] border border-[#232935] rounded-lg min-w-[100px] text-center">
                {monthNames[currentMonth]} {currentYear}.
              </span>

              <button
                onClick={handleNextMonth}
                className="p-1.5 bg-[#161a22] hover:bg-white/5 border border-[#232935] text-gray-400 hover:text-white rounded-lg transition-colors"
                title="Sledeći mesec"
              >
                <ChevronRight className="w-4 h-4" />
              </button>
            </div>
          </div>

          {/* Quick Category Legend */}
          <div className="flex flex-wrap items-center gap-x-4 gap-y-1.5 pt-1.5 border-t border-[#1e222b]/50 text-[10px] text-[#9aa3b2]">
            <span className="font-semibold text-gray-400 uppercase tracking-wider">Kategorije:</span>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-blue-500/20 border border-blue-500" />
              <span>VDV akcija</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-amber-500/20 border border-amber-500" />
              <span>Sastanak</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-[#a855f7]/20 border border-[#a855f7]" />
              <span>Štand / Promo</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-rose-500/20 border border-rose-500" />
              <span>Prikupljanje potpisa</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-sky-500/20 border border-sky-500" />
              <span>Obuka kontrolora</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-teal-500/20 border border-teal-500" />
              <span>Obuka vdv volontera</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-500/20 border border-emerald-500" />
              <span>Drugo</span>
            </div>
          </div>

          {/* Monthly Day Grid */}
          <div className="grid grid-cols-7 gap-1 text-center">
            {/* Day of Week Labels */}
            {['Pon', 'Uto', 'Sre', 'Čet', 'Pet', 'Sub', 'Ned'].map((day) => (
              <div key={day} className="py-2 text-[10px] font-extrabold text-[#9aa3b2] uppercase tracking-wider">
                {day}
              </div>
            ))}

            {/* Grid days */}
            {daysArray.map((day, idx) => {
              if (day === null) {
                return (
                  <div 
                    key={`empty-${idx}`} 
                    className="aspect-square bg-transparent border border-transparent rounded-xl"
                  />
                );
              }

              const dateStr = formatDateStr(day);
              const dayEvents = events.filter(e => e.date === dateStr);
              const isToday = dateStr === '2026-06-24'; // context current local mock day
              const isSelected = selectedDateStr === dateStr;

              return (
                <button
                  key={`day-${day}`}
                  type="button"
                  onClick={() => setSelectedDateStr(dateStr)}
                  className={`aspect-square p-2 rounded-xl border text-left flex flex-col justify-between transition-all group relative cursor-pointer ${
                    isSelected 
                      ? 'bg-blue-600/15 border-blue-500 text-white'
                      : isToday
                      ? 'bg-amber-500/10 border-amber-500 text-amber-400'
                      : 'bg-[#161a22] border-[#232935] hover:border-gray-500 text-gray-300 hover:text-white'
                  }`}
                >
                  {/* Day number */}
                  <div className="flex items-center justify-between w-full">
                    <span className={`text-xs font-bold ${isToday ? 'text-amber-400' : 'text-gray-300'}`}>
                      {day}
                    </span>
                    {isToday && (
                      <span className="text-[8px] font-extrabold tracking-wide uppercase px-1 py-0.2 bg-amber-500 text-black rounded">
                        Danas
                      </span>
                    )}
                  </div>

                  {/* Badges or Dot indicators for events inside this cell */}
                  <div className="mt-1 space-y-0.5 overflow-hidden w-full">
                    {dayEvents.slice(0, 2).map((ev) => {
                      let catColor = 'bg-blue-500';
                      if (ev.category === 'Sastanak') catColor = 'bg-amber-500';
                      if (ev.category === 'Štand') catColor = 'bg-purple-500';
                      if (ev.category === 'Prikupljanje potpisa') catColor = 'bg-rose-500';
                      if (ev.category === 'Obuka kontrolora') catColor = 'bg-sky-500';
                      if (ev.category === 'Obuka vdv volontera') catColor = 'bg-teal-500';
                      if (ev.category === 'Drugo') catColor = 'bg-emerald-500';

                      return (
                        <div 
                          key={ev.id} 
                          className="flex items-center gap-1 text-[8px] font-medium leading-none text-gray-200 truncate"
                        >
                          <span className={`w-1 h-1 rounded-full ${catColor} flex-shrink-0`} />
                          <span className="truncate max-w-[90%]">{ev.text}</span>
                        </div>
                      );
                    })}
                    {dayEvents.length > 2 && (
                      <div className="text-[7px] font-extrabold text-blue-400 text-right">
                        +{dayEvents.length - 2} još
                      </div>
                    )}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* DESNA KOLONA: ZADACI I TASKOVI (lg:col-span-4 na velikim ekranima) */}
      <div className="lg:col-span-4 space-y-4">
        <div className="p-6 bg-[#101318] border border-[#1e222b] rounded-2xl space-y-4">
          
          <div className="flex items-center justify-between border-b border-[#1e222b] pb-3">
            <div className="flex items-center gap-2">
              <ClipboardList className="w-5 h-5 text-blue-400" />
              <h3 className="text-sm font-bold text-white uppercase tracking-wide">
                Zadaci / Taskovi
              </h3>
            </div>
            
            <span className="text-[10px] font-bold px-2 py-0.5 bg-blue-600/10 text-blue-400 rounded-lg">
              Notion stil
            </span>
          </div>

          {/* Stats Progress Bar */}
          <div className="space-y-1.5 bg-[#161a22] border border-[#232935] p-3.5 rounded-xl">
            <div className="flex items-center justify-between text-[11px] font-semibold">
              <span className="text-gray-400">Progres zadataka</span>
              <span className="text-white">{completedCount} od {totalTasksCount} ({progressPercent}%)</span>
            </div>
            <div className="w-full h-1.5 bg-[#101318] rounded-full overflow-hidden">
              <div 
                className="h-full bg-blue-500 rounded-full transition-all duration-300"
                style={{ width: `${progressPercent}%` }}
              />
            </div>
          </div>

          {/* New Task Entry Input */}
          <form onSubmit={handleAddTask} className="space-y-3 p-3 bg-[#161a22]/30 border border-[#232935]/50 rounded-xl">
            <div className="space-y-1">
              <label className="text-[9px] font-bold text-[#9aa3b2] uppercase tracking-wider">Novi zadatak</label>
              <input
                type="text"
                required
                placeholder="Napišite šta treba uraditi..."
                value={newTaskText}
                onChange={(e) => setNewTaskText(e.target.value)}
                className="w-full px-3 py-1.5 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
              />
            </div>

            <div className="space-y-1.5">
              <label className="text-[9px] font-bold text-[#9aa3b2] uppercase tracking-wider block">Prioritet</label>
              <div className="flex items-center gap-1">
                <button
                  type="button"
                  onClick={() => setNewTaskPriority('high')}
                  className={`flex-1 py-1 text-[9px] font-extrabold uppercase rounded-lg border transition-all ${
                    newTaskPriority === 'high'
                      ? 'bg-red-500/15 border-red-500 text-red-400'
                      : 'bg-transparent border-[#232935] text-gray-500 hover:text-gray-300'
                  }`}
                >
                  Visok
                </button>
                <button
                  type="button"
                  onClick={() => setNewTaskPriority('medium')}
                  className={`flex-1 py-1 text-[9px] font-extrabold uppercase rounded-lg border transition-all ${
                    newTaskPriority === 'medium'
                      ? 'bg-amber-500/15 border-amber-500 text-amber-400'
                      : 'bg-transparent border-[#232935] text-gray-500 hover:text-gray-300'
                  }`}
                >
                  Srednji
                </button>
                <button
                  type="button"
                  onClick={() => setNewTaskPriority('low')}
                  className={`flex-1 py-1 text-[9px] font-extrabold uppercase rounded-lg border transition-all ${
                    newTaskPriority === 'low'
                      ? 'bg-blue-500/15 border-blue-500 text-blue-400'
                      : 'bg-transparent border-[#232935] text-gray-500 hover:text-gray-300'
                  }`}
                >
                  Nizak
                </button>
              </div>
            </div>

            <button
              type="submit"
              className="w-full py-1.5 bg-blue-600 hover:bg-blue-700 text-xs font-bold text-white rounded-xl transition-all flex items-center justify-center gap-1 cursor-pointer"
            >
              <Plus className="w-3.5 h-3.5" />
              <span>Dodaj zadatak</span>
            </button>
          </form>

          {/* List of Tasks */}
          <div className="pt-2 border-t border-[#1e222b] space-y-2 max-h-[320px] overflow-y-auto pr-1">
            {tasks.length === 0 ? (
              <div className="p-8 text-center text-[#9aa3b2] italic text-xs space-y-1">
                <Sparkles className="w-6 h-6 mx-auto text-gray-600" />
                <p>Nema unetih zadataka.</p>
                <p className="text-[10px]">Unesite novi zadatak iznad.</p>
              </div>
            ) : (
              tasks.map((task) => {
                let priorityColor = 'text-blue-400';
                let priorityText = 'Nizak';
                let priorityBg = 'bg-blue-500/5';
                
                if (task.priority === 'high') {
                  priorityColor = 'text-red-400';
                  priorityText = 'Visok';
                  priorityBg = 'bg-red-500/5';
                } else if (task.priority === 'medium') {
                  priorityColor = 'text-amber-400';
                  priorityText = 'Srednji';
                  priorityBg = 'bg-amber-500/5';
                }

                return (
                  <div 
                    key={task.id} 
                    className={`p-3 bg-[#161a22] border border-[#232935] rounded-xl flex items-start gap-2.5 transition-all group ${
                      task.completed ? 'opacity-55' : ''
                    } ${priorityBg}`}
                  >
                    {/* Checkbox */}
                    <button
                      type="button"
                      onClick={() => handleToggleTask(task.id)}
                      className="mt-0.5 text-gray-400 hover:text-blue-400 transition-colors flex-shrink-0 cursor-pointer"
                    >
                      {task.completed ? (
                        <CheckCircle2 className="w-4 h-4 text-blue-500 fill-blue-500/10" />
                      ) : (
                        <Circle className="w-4 h-4" />
                      )}
                    </button>

                    {/* Task Text & Priority Info */}
                    <div className="flex-1 space-y-1 min-w-0">
                      <p className={`text-xs font-semibold text-white leading-snug break-words ${
                        task.completed ? 'line-through text-gray-500 font-medium' : ''
                      }`}>
                        {task.text}
                      </p>
                      
                      <div className="flex flex-wrap items-center gap-x-2 gap-y-0.5 text-[9px] font-semibold text-[#9aa3b2]">
                        <span className={`font-bold ${priorityColor}`}>
                          {priorityText} prioritet
                        </span>
                        <span>•</span>
                        <span className="flex items-center gap-0.5">
                          <Clock className="w-2.5 h-2.5" />
                          {task.dateAdded}
                        </span>
                        <span>•</span>
                        <span className="text-blue-400">Dodao: {task.addedBy || 'Kaluđer'}</span>
                      </div>
                    </div>

                    {/* Delete button */}
                    <button
                      onClick={() => handleDeleteTask(task.id)}
                      className="text-[#9aa3b2] hover:text-red-400 p-1 opacity-0 group-hover:opacity-100 transition-opacity rounded hover:bg-white/5 cursor-pointer"
                      title="Obriši zadatak"
                    >
                      <Trash2 className="w-3.5 h-3.5" />
                    </button>
                  </div>
                );
              })
            )}
          </div>

        </div>
      </div>

      {/* 3. CALENDAR DATE DETAILS MODAL POPUP (POJAVLJUJE SE KLIKOM NA BILO KOJI DATUM) */}
      {selectedDateStr && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/75 backdrop-blur-sm animate-fade-in">
          
          {/* Modal Box */}
          <div className="w-full max-w-xl bg-[#0e1116] border border-[#1e222b] rounded-2xl shadow-2xl overflow-hidden">
            
            {/* Modal Header */}
            <div className="flex items-center justify-between p-4 bg-[#12161f] border-b border-[#1e222b]">
              <div className="flex items-center gap-2">
                <CalendarDays className="w-5 h-5 text-blue-400" />
                <div>
                  <h4 className="text-[10px] font-bold text-[#9aa3b2] uppercase tracking-wider">Plan za odabrani datum</h4>
                  <p className="text-xs font-bold text-white">
                    {new Date(selectedDateStr).toLocaleDateString('sr-RS', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                  </p>
                </div>
              </div>
              
              <button
                onClick={() => setSelectedDateStr(null)}
                className="p-1.5 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-colors cursor-pointer"
                title="Zatvori"
              >
                <X className="w-4 h-4" />
              </button>
            </div>

            {/* Modal Content */}
            <div className="p-5 space-y-4 max-h-[75vh] overflow-y-auto">
              
              {/* List of actions/events */}
              <div className="space-y-2">
                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">
                  Planirane aktivnosti za ovaj dan
                </span>
                
                {events.filter(e => e.date === selectedDateStr).length === 0 ? (
                  <div className="p-4 bg-[#161a22]/30 border border-[#232935]/50 rounded-xl text-center">
                    <p className="text-xs text-[#9aa3b2] italic">Nema zakazanih aktivnosti za ovaj dan.</p>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {events
                      .filter(e => e.date === selectedDateStr)
                      .map(ev => {
                        let catBg = 'bg-blue-500/10 text-blue-400 border-blue-500/20';
                        if (ev.category === 'Sastanak') catBg = 'bg-amber-500/10 text-amber-400 border-amber-500/20';
                        if (ev.category === 'Štand') catBg = 'bg-purple-500/10 text-purple-400 border-purple-500/20';
                        if (ev.category === 'Prikupljanje potpisa') catBg = 'bg-rose-500/10 text-rose-400 border-rose-500/20';
                        if (ev.category === 'Obuka kontrolora') catBg = 'bg-sky-500/10 text-sky-400 border-sky-500/20';
                        if (ev.category === 'Obuka vdv volontera') catBg = 'bg-teal-500/10 text-teal-400 border-teal-500/20';
                        if (ev.category === 'Drugo') catBg = 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';

                        return (
                          <div 
                            key={ev.id} 
                            className="p-3 bg-[#161a22] border border-[#232935] rounded-xl flex items-center justify-between gap-3 group"
                          >
                            <div className="flex-1 space-y-1">
                              <div className="flex items-center justify-between gap-2">
                                <span className={`px-1.5 py-0.5 rounded text-[8px] font-bold uppercase tracking-wider border ${catBg}`}>
                                  {ev.category || 'Drugo'}
                                </span>
                                <span className="text-[9px] font-semibold text-[#9aa3b2]">
                                  Dodao: <span className="text-blue-400">{ev.addedBy || 'Kaluđer'}</span>
                                </span>
                              </div>
                              
                              {editingEventId === ev.id ? (
                                <div className="flex items-center gap-1.5 mt-1">
                                  <input
                                    type="text"
                                    value={editingEventText}
                                    onChange={(e) => setEditingEventText(e.target.value)}
                                    className="px-2.5 py-1 text-xs bg-[#101318] border border-blue-500 rounded-lg text-white focus:outline-none flex-1"
                                  />
                                  <button
                                    onClick={() => handleSaveEditEvent(ev.id)}
                                    className="px-2 py-1 bg-blue-600 hover:bg-blue-700 text-[10px] font-semibold text-white rounded-lg transition-colors cursor-pointer"
                                  >
                                    Sačuvaj
                                  </button>
                                </div>
                              ) : (
                                <p className="text-xs font-semibold text-white">{ev.text}</p>
                              )}
                            </div>

                            <div className="flex items-center gap-1">
                              {editingEventId !== ev.id && (
                                <button
                                  onClick={() => handleStartEditEvent(ev)}
                                  className="p-1 text-[#9aa3b2] hover:text-white rounded hover:bg-white/5 cursor-pointer"
                                  title="Izmeni"
                                >
                                  <Edit2 className="w-3.5 h-3.5" />
                                </button>
                              )}
                              <button
                                onClick={() => handleDeleteEvent(ev.id)}
                                className="p-1 text-red-400 hover:bg-red-500/10 rounded cursor-pointer"
                                title="Obriši akciju"
                              >
                                <Trash2 className="w-3.5 h-3.5" />
                              </button>
                            </div>
                          </div>
                        );
                      })
                    }
                  </div>
                )}
              </div>

              {/* Form to add calendar event */}
              <form onSubmit={handleAddEvent} className="pt-4 border-t border-[#1e222b] space-y-3">
                <h5 className="text-[10px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1">
                  <Plus className="w-3 h-3 text-blue-400" />
                  <span>Dodaj akciju na ovaj dan</span>
                </h5>
                
                <div className="grid grid-cols-1 sm:grid-cols-12 gap-2">
                  <div className="sm:col-span-8">
                    <input
                      type="text"
                      required
                      placeholder="Unesite opis akcije (npr. Podela flajera)"

}

interface PendingTabProps {
  pending: PendingPerson[];
  onApprove: (item: PendingPerson) => void;
  onReject: (id: string) => void;
  isReadOnly: boolean;
  pendingActionsEnabled?: boolean;
  onAddPending?: (item: PendingPerson) => void;
}

function PendingTab({ pending, onApprove, onReject, isReadOnly, pendingActionsEnabled = true, onAddPending }: PendingTabProps) {
  const [copied, setCopied] = useState(false);
  const signupLink = 'https://vracar.strukturnozapošljavanje.org/signup?ref=opstina';

  const handleCopyLink = () => {
    navigator.clipboard.writeText(signupLink);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const handleSimulate = () => {
    if (!onAddPending) return;
    const ime = FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)];
    const prezime = LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)];
    const reon = REONI_LIST[Math.floor(Math.random() * REONI_LIST.length)];
    const bmGlasa = String(Math.floor(Math.random() * 45) + 1).padStart(3, '0');
    const uloga = ROLES_LIST[Math.floor(Math.random() * ROLES_LIST.length)];
    const auto = Math.random() > 0.6;
    const iskustvo = Math.random() > 0.5;
    const tel = `06${Math.floor(Math.random() * 4) + 2} ${Math.floor(Math.random() * 900) + 100} ${Math.floor(Math.random() * 9000) + 1000}`;
    const email = `${ime.toLowerCase()}.${prezime.toLowerCase().replace('ć', 'c').replace('đ', 'dj')}@mail.com`;
    const tg = `@${ime.toLowerCase()}${Math.floor(Math.random() * 99)}`;
    const napomene = Math.random() > 0.3 ? NOTES_LIST[Math.floor(Math.random() * NOTES_LIST.length)] : '';

    const newPending: PendingPerson = {
      id: `pending_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
      ime,
      prezime,
      tel,
      email,
      tg,
      reon,
      bmGlasa,
      uloga,
      auto,
      iskustvo,
      napomene
    };

    onAddPending(newPending);
  };

  return (
    <div className="space-y-6">
      {/* Signup URL widget */}
      <div className="p-6 bg-gradient-to-r from-[#101318] to-[#161b24] border border-[#1e222b] rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div className="space-y-1">
          <div className="flex items-center gap-2 text-sm font-semibold text-white">
            <Sparkles className="w-4 h-4 text-amber-400" />
            <span>Javna forma za regrutaciju volontera</span>
          </div>
          <p className="text-xs text-[#9aa3b2]">
            Podelite ovaj link na društvenim mrežama ili Viber/Telegram grupama. Svi prijavljeni će se odmah pojaviti ispod.
          </p>
        </div>
        <div className="flex items-center gap-2 bg-[#0c0e12] border border-[#1e222b] px-3.5 py-2 rounded-xl max-w-full overflow-hidden">
          <span className="text-xs text-[#9aa3b2] truncate select-all">{signupLink}</span>
          <button 
            onClick={handleCopyLink}
            className="p-1.5 rounded-lg hover:bg-white/5 text-[#9aa3b2] hover:text-white transition-colors flex-shrink-0"
            title="Kopiraj link"
          >
            {copied ? <Check className="w-4 h-4 text-emerald-400" /> : <Copy className="w-4 h-4" />}
          </button>
        </div>
      </div>

      {/* Main Table List of Registrations */}
      <div className="space-y-4">
        <div className="flex justify-between items-center">
          <h3 className="text-sm font-semibold text-white flex items-center gap-2">
            <ClipboardList className="w-4.5 h-4.5 text-blue-400" />
            <span>Prijave na čekanju ({pending.length})</span>
          </h3>
          
          {!isReadOnly && onAddPending && (
            <button
              onClick={handleSimulate}
              className="px-3.5 py-1.5 bg-gradient-to-r from-amber-500/10 to-blue-500/10 hover:from-amber-500/20 hover:to-blue-500/20 border border-blue-500/30 hover:border-blue-500/50 text-blue-300 hover:text-white text-xs font-bold rounded-xl transition-all flex items-center gap-1.5 shadow-sm active:scale-95"
            >
              <Plus className="w-4 h-4" />
              Generiši novu prijavu
            </button>
          )}
        </div>

        {pending.length === 0 ? (
          <div className="p-12 text-center bg-[#101318] border border-[#1e222b] rounded-2xl space-y-2">
            <div className="inline-flex p-3 rounded-full bg-emerald-500/10 text-emerald-400">
              <CheckCircle2 className="w-6 h-6" />
            </div>
            <h4 className="text-sm font-medium text-white">Sve prijave su pregledane!</h4>
            <p className="text-xs text-[#9aa3b2]">Trenutno nema novih kandidata koji čekaju odobrenje.</p>
          </div>
        ) : (
          <div className="bg-[#101318] border border-[#1e222b] rounded-2xl overflow-hidden shadow-xl">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse table-auto font-sans">
                <thead>
                  <tr className="border-b border-[#1e222b] text-[#9aa3b2] bg-[#0c0e12] text-xs font-bold uppercase tracking-wider">
                    <th className="p-4">Ime i prezime / Reon</th>
                    <th className="p-4">Željena uloga</th>
                    <th className="p-4 text-center">BM Glasa</th>
                    <th className="p-4">Kontakt podaci</th>
                    <th className="p-4 text-center">Dodatno</th>
                    <th className="p-4 max-w-xs">Napomene</th>
                    {pendingActionsEnabled && <th className="p-4 text-right">Akcije</th>}
                  </tr>
                </thead>
                <tbody className="divide-y divide-[#1e222b] text-xs">
                  {pending.map((item) => (
                    <tr 
                      key={item.id} 
                      className="hover:bg-white/2 transition-colors text-gray-300"
                    >
                      {/* Name & Settlement */}
                      <td className="p-4">
                        <div className="font-semibold text-white text-sm">
                          {item.ime} {item.prezime}
                        </div>
                        <div className="text-xs text-[#9aa3b2] mt-0.5">
                          Reon: <span className="text-gray-300">{item.reon}</span>
                        </div>
                      </td>

                      {/* Role Badge */}
                      <td className="p-4">
                        {item.uloga ? (
                          <span className="inline-block px-2.5 py-1 text-[10px] font-bold uppercase rounded border border-blue-500/20 bg-blue-500/5 text-blue-400 capitalize">
                            {item.uloga}
                          </span>
                        ) : (
                          <span className="inline-block px-2 py-0.5 text-[10px] font-semibold rounded border border-gray-500/20 bg-gray-500/5 text-gray-400">
                            Bez uloge
                          </span>
                        )}
                      </td>

                      {/* Polling Station */}
                      <td className="p-4 text-center font-mono font-bold text-[#e7e9ee]">
                        {item.bmGlasa || '—'}
                      </td>

                      {/* Contacts */}
                      <td className="p-4 space-y-1">
                        <div className="flex items-center gap-1.5 text-gray-300">
                          <Phone className="w-3.5 h-3.5 text-[#9aa3b2] shrink-0" />
                          <span>{item.tel}</span>
                        </div>
                        {item.email && (
                          <div className="flex items-center gap-1.5 text-[#9aa3b2]">
                            <Mail className="w-3.5 h-3.5 shrink-0" />
                            <span className="truncate max-w-[150px]">{item.email}</span>
                          </div>
                        )}
                        {item.tg && (
                          <div className="flex items-center gap-1.5 text-sky-400">
                            <MessageSquare className="w-3.5 h-3.5 shrink-0" />
                            <span>{item.tg}</span>
                          </div>
                        )}
                      </td>

                      {/* Auto & Experience Badges */}
                      <td className="p-4">
                        <div className="flex flex-col items-center gap-1">
                          {item.auto && (
                            <span className="text-[9px] font-extrabold uppercase bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.5 rounded shrink-0">
                              Auto
                            </span>
                          )}
                          {item.iskustvo && (
                            <span className="text-[9px] font-extrabold uppercase bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-1.5 py-0.5 rounded shrink-0">
                              Iskusan
                            </span>

                          {!item.auto && !item.iskustvo && (
                            <span className="text-gray-600 text-[10px]">—</span>
                          )}

                      </td>

                      {/* Notes */}
                      <td className="p-4 max-w-xs">
                        <p className="text-gray-400 italic break-words line-clamp-2" title={item.napomene}>
                          {item.napomene ? `“${item.napomene}”` : 'Nema napomene'}
                        </p>
                      </td>

                      {/* Approve / Reject Actions */}
                      {pendingActionsEnabled && (
                        <td className="p-4 text-right">
                          <div className="inline-flex gap-2">
                            <button
                              onClick={() => onReject(item.id)}
                              disabled={!pendingActionsEnabled}
                              className={`p-1.5 ${pendingActionsEnabled ? 'bg-red-500/10 hover:bg-red-500/25 border border-red-500/20 hover:border-red-500/40 text-red-400' : 'bg-transparent border border-transparent text-gray-500'} rounded-lg transition-colors`}
                              title="Odbij prijavu"
                            >
                              <UserX className="w-4 h-4" />
                            </button>
                            <button
                              onClick={() => onApprove(item)}
                              disabled={!pendingActionsEnabled}
                              className={`px-3 py-1.5 ${pendingActionsEnabled ? 'bg-emerald-500/10 hover:bg-emerald-500/25 border border-emerald-500/20 hover:border-emerald-500/40 text-emerald-400' : 'bg-transparent border border-transparent text-gray-500'} rounded-lg transition-colors flex items-center gap-1 font-semibold`}
                              title="Odobri i upiši u bazu"
                            >
                              <UserCheck className="w-4 h-4" />
                              <span>Odobri</span>
                            </button>
                          </div>
                        </td>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ===== components/BMTab.tsx =====
interface BMTabProps {
  bm: BirackoMesto[];
  people: Person[];
  onAddBM: (newBM: BirackoMesto) => void;
  onDeleteBM: (broj: string) => void;
  onAssignPerson: (pid: string, targetId: string, targetRole: string) => void;
  canAssignPerson: boolean;
  isReadOnly: boolean;
  allowAddBM?: boolean;
  reoni?: string[];
}

function BMTab({ bm, people, onAddBM, onDeleteBM, onAssignPerson, canAssignPerson, isReadOnly, allowAddBM = true, reoni = REONI }: BMTabProps) {
  const [searchQuery, setSearchQuery] = useState('');
  const [isModalOpen, setIsModalOpen] = useState(false);

  // Form states for adding BM
  const [broj, setBroj] = useState('');
  const [naziv, setNaziv] = useState('');
  const [adresa, setAdresa] = useState('');
  const [reon, setReon] = useState(reoni[0] || 'Neimar');
  const [deli, setDeli] = useState(false);

  // Form states for assigning person
  const [selectedPersonId, setSelectedPersonId] = useState('');
  const [selectedBMId, setSelectedBMId] = useState('');
  const [selectedRole, setSelectedRole] = useState('kontrolor');
  const [selectedPersonSearch, setSelectedPersonSearch] = useState('');
  const [isPersonDropdownOpen, setIsPersonDropdownOpen] = useState(false);
  const personDropdownRef = useRef<HTMLDivElement | null>(null);

  useEffect(() => {
    setReon(reoni[0] || 'Neimar');
  }, [reoni]);

  useEffect(() => {
    const handleClickOutside = (event: MouseEvent) => {
      if (
        personDropdownRef.current &&
        !personDropdownRef.current.contains(event.target as Node)
      ) {
        setIsPersonDropdownOpen(false);
      }
    };

    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const handleAddBMSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (!broj || !naziv || !adresa) return;
    
    // Check if already exists
    if (bm.some(b => b.broj === broj)) {
      alert(`Biračko mesto sa brojem ${broj} već postoji.`);
      return;
    }

    onAddBM({
      broj,
      naziv,
      adresa,
      reon,
      deli,
      sefBM: [],
      kontrolori: []
    });

    // Reset
    setBroj('');
    setNaziv('');
    setAdresa('');
    setDeli(false);
    setIsModalOpen(false);
  };

  const handleAssignPersonSubmit = (e: React.FormEvent) => {
    e.preventDefault();
    if (!selectedPersonId || !selectedBMId || !selectedRole) {
      alert('Molimo odaberite osobu, biračko mesto i ulogu.');
      return;
    }

    onAssignPerson(selectedPersonId, selectedBMId, selectedRole);
    setSelectedPersonId('');
    setSelectedPersonSearch('');
    setSelectedBMId('');
    setSelectedRole('kontrolor');
    setIsPersonDropdownOpen(false);
    setIsModalOpen(false);
  };

  const filteredBM = bm.filter(b => 
    b.broj.includes(searchQuery) || 
    b.naziv.toLowerCase().includes(searchQuery.toLowerCase())
  );

  return (
    <div className="space-y-6">
      {/* Top action bar */}
      <div className="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center">
        {/* Search */}
        <div className="relative max-w-md w-full">
          <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 pointer-events-none">
            <Search className="w-4 h-4" />
          </span>
          <input
            type="text"
            placeholder="Pretraži biračka mesta..."
            value={searchQuery}
            onChange={(e) => setSearchQuery(e.target.value)}
            className="w-full pl-9 pr-4 py-2 text-xs bg-[#101318] border border-[#1e222b] rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          />
        </div>

        {/* Add BM / Assign Person Button */}
        {((canAssignPerson || !isReadOnly) && (allowAddBM ?? true)) && (
          <button
            onClick={() => setIsModalOpen(true)}
            className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white rounded-xl transition-colors flex items-center gap-1.5 justify-center"
          >
            <Plus className="w-4 h-4" />
            {canAssignPerson ? 'Rasporedi osobu' : 'Novo biračko mesto'}
          </button>
        )}
      </div>

      {/* Grid of Biračka Mesta */}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {filteredBM.map((b) => {
          const sefNames = b.sefBM.map(id => people.find(p => p.id === id)?.imePrezime).filter(Boolean);
          const kontrolorNames = b.kontrolori.map(id => people.find(p => p.id === id)?.imePrezime).filter(Boolean);
          
          const hasSef = sefNames.length > 0;
          const kCount = kontrolorNames.length;
          
          let statusColor = 'border-red-500/20 bg-red-500/5 text-red-400';
          let statusText = 'Nema šefa';
          
          if (hasSef && kCount >= 2) {
            statusColor = 'border-emerald-500/20 bg-emerald-500/5 text-emerald-400';
            statusText = 'Popunjeno';
          } else if (hasSef) {
            statusColor = 'border-amber-500/20 bg-amber-500/5 text-amber-400';
            statusText = `Fali kontrolor (${kCount}/2)`;
          } else if (kCount > 0) {
            statusColor = 'border-red-500/20 bg-red-500/5 text-red-400';
            statusText = 'Fali šef biračkog mesta';
          }

          return (
            <div 
              key={b.broj}
              className="bg-[#101318] border border-[#1e222b] rounded-2xl p-5 hover:border-[#2a303d] transition-all flex flex-col justify-between"
            >
              <div>
                {/* Header */}
                <div className="flex justify-between items-start gap-3">
                  <div>
                    <span className="text-xs font-extrabold uppercase bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-0.5 rounded">
                      BM {b.broj}
                    </span>
                  </div>

                  {!isReadOnly && (
                    <button
                      onClick={() => {
                        if (confirm(`Da li ste sigurni da želite obrisati biračko mesto BM ${b.broj}?`)) {
                          onDeleteBM(b.broj);
                        }
                      }}
                      className="text-[#9aa3b2] hover:text-red-400 p-1 rounded-lg hover:bg-white/5 transition-colors"
                      title="Obriši"
                    >
                      <Trash2 className="w-4 h-4" />
                    </button>
                  )}
                </div>

                {/* Name & Address */}
                <div className="mt-4">
                  <h4 className="text-sm font-semibold text-white leading-tight">{b.naziv}</h4>
                  <p className="text-[11px] text-[#9aa3b2] mt-1 flex items-center gap-1">
                    <MapPin className="w-3 h-3 flex-shrink-0" />
                    <span className="truncate">{b.adresa}</span>
                  </p>
                </div>

                {/* Shared status indicator */}
                {b.deli && (
                  <div className="mt-2 text-[10px] bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-md inline-block font-medium">
                    Deljeno biračko mesto (Zajedničko)
                  </div>
                )}

                {/* Team Assignment Breakdown */}
                <div className="mt-5 space-y-3.5">
                  {/* Šef BM */}
                  <div className="space-y-1">
                    <div className="text-[10px] text-[#9aa3b2] uppercase tracking-wider font-semibold flex items-center gap-1">
                      <Shield className="w-3 h-3 text-emerald-400" />
                      <span>Šef biračkog mesta</span>
                    </div>
                    {sefNames.length > 0 ? (
                      <div className="text-xs text-white font-semibold">
                        {sefNames.join(', ')}
                      </div>
                    ) : (
                      <div className="text-xs text-[#ef4444] font-medium flex items-center gap-1 italic">
                        <AlertTriangle className="w-3 h-3" />
                        Nije raspoređen
                      </div>
                    )}
                  </div>

                  {/* Kontrolori */}
                  <div className="space-y-1">
                    <div className="text-[10px] text-[#9aa3b2] uppercase tracking-wider font-semibold flex items-center gap-1">
                      <Users className="w-3 h-3 text-indigo-400" />
                      <span>Kontrolori ({kCount}/2)</span>
                    </div>
                    {kontrolorNames.length > 0 ? (
                      <div className="text-xs text-white space-y-0.5">
                        {kontrolorNames.map((name, i) => (
                          <div key={i} className="flex items-center gap-1.5">
                            <span className="w-1 h-1 bg-emerald-400 rounded-full" />
                            <span>{name}</span>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-xs text-[#9aa3b2] italic">Nema raspoređenih kontrolora</div>
                    )}
                  </div>
                </div>
              </div>

              {/* Status footer badge */}
              <div className={`mt-5 pt-3.5 border-t border-[#1e222b] text-[10px] font-bold uppercase tracking-wider flex items-center justify-between`}>
                <span className="text-[#9aa3b2]">Stanje tima</span>
                <span className={`px-2 py-0.5 rounded border ${statusColor}`}>
                  {statusText}
                </span>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add BM Modal */}
      {isModalOpen && (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center z-50 p-4 animate-fade-in">
          <div className="bg-[#101318] border border-[#1e222b] w-full max-w-md rounded-2xl overflow-hidden shadow-xl">
            <div className="px-6 py-4 border-b border-[#1e222b] flex justify-between items-center">
              <h3 className="text-sm font-semibold text-white">
                {canAssignPerson ? 'Rasporedi osobu na BM' : 'Dodaj novo biračko mesto'}
              </h3>
              <button 
                onClick={() => setIsModalOpen(false)}
                className="text-gray-400 hover:text-white p-1 rounded-lg hover:bg-white/5"
              >
                <X className="w-4 h-4" />
              </button>
            </div>

            {canAssignPerson ? (
              <form onSubmit={handleAssignPersonSubmit} className="p-6 space-y-4">
                <div className="space-y-1 relative" ref={personDropdownRef}>
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Izaberi osobu</label>
                  <input
                    type="text"
                    placeholder="Pretraži i izaberi osobu..."
                    value={selectedPersonSearch}
                    onChange={(e) => {
                      setSelectedPersonSearch(e.target.value);
                      setIsPersonDropdownOpen(true);
                      setSelectedPersonId('');
                    }}
                    onFocus={() => setIsPersonDropdownOpen(true)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  />

                  {isPersonDropdownOpen && (
                    <div className="absolute inset-x-0 top-full mt-1 max-h-52 overflow-y-auto bg-[#101318] border border-[#232935] rounded-xl shadow-2xl z-40">
                      {people.filter(p => !p.rasporedjen && p.imePrezime.toLowerCase().includes(selectedPersonSearch.toLowerCase())).slice(0, 10).map(person => (
                        <button
                          key={person.id}
                          type="button"
                          onClick={() => {
                            setSelectedPersonId(person.id);
                            setSelectedPersonSearch(`${person.imePrezime} (${person.uloga || 'bez uloge'})`);
                            setIsPersonDropdownOpen(false);
                          }}
                          className="w-full text-left px-3 py-2 text-xs text-white hover:bg-blue-600/10 transition-colors"
                        >
                          {person.imePrezime} <span className="text-[#9aa3b2]">({person.uloga || 'bez uloge'})</span>
                        </button>
                      ))}
                      {people.filter(p => !p.rasporedjen && p.imePrezime.toLowerCase().includes(selectedPersonSearch.toLowerCase())).length === 0 && (
                        <div className="px-3 py-2 text-xs text-[#9aa3b2]">Nema rezultata za "{selectedPersonSearch}"</div>
                      )}
                    </div>
                  )}
                </div>

                <div className="space-y-1">
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Odaberi biračko mesto</label>
                  <select
                    required
                    value={selectedBMId}
                    onChange={(e) => setSelectedBMId(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  >
                    <option value="">-- Odaberi biračko mesto --</option>
                    {bm.map(b => (
                      <option key={b.broj} value={b.broj}>{`BM ${b.broj} — ${b.naziv}`}</option>
                    ))}
                  </select>
                </div>

                <div className="space-y-1">
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Uloga / Dužnost</label>
                  <select
                    required
                    value={selectedRole}
                    onChange={(e) => setSelectedRole(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  >
                    <option value="kontrolor">Kontrolor</option>
                    <option value="sef_bm">Šef biračkog mesta</option>
                  </select>
                </div>

                <div className="pt-4 flex gap-2 justify-end border-t border-[#1e222b]">
                  <button
                    type="button"
                    onClick={() => setIsModalOpen(false)}
                    className="px-4 py-2 text-xs text-gray-400 hover:text-white hover:bg-white/5 rounded-xl transition-colors"
                  >
                    Odustani
                  </button>
                  <button
                    type="submit"
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-xs font-semibold text-white rounded-xl transition-colors"
                  >
                    Rasporedi osobu
                  </button>
                </div>
              </form>
            ) : (
              <form onSubmit={handleAddBMSubmit} className="p-6 space-y-4">
                {/* Broj BM */}
                <div className="space-y-1">
                  <label className="text-[10px] font-semibold text-[#9aa3b2] uppercase tracking-wider">Broj biračkog mesta</label>
                  <input
                    type="text"
                    required
                    placeholder="npr. 012"
                    value={broj}
                    onChange={(e) => setBroj(e.target.value)}
                    className="w-full px-3 py-2 text-xs bg-[#161a22] border border-[#232935] rounded-xl text-white focus:outline-none focus:ring-1 focus:ring-blue-500"
                  />
                </div>

                {/* Naziv lokacije */}
                <div className="space-y-1">
