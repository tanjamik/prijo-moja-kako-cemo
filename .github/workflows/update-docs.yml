name: Update docs build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/index.html'

permissions:
  contents: write

concurrency:
  group: update-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: cp dist/index.html docs/index.html

      - name: Commit and push docs/index.html if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "docs/index.html already up to date"
            exit 0
          fi
          git commit -m "chore: rebuild docs/index.html [skip ci]"
          git push
