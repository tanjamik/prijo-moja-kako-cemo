<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mreža poverenja — Plan implementacije</title>
<style>
  :root{
    --zelena:#C0DD97; --plava:#B5D4F4; --zuta:#FAC775; --crvena:#F7C1C1; --siva:#F1EFE8;
    --bg:#f7f6f2; --card:#ffffff; --ink:#232323; --muted:#77726a; --border:#e5e1d8;
    --accent:#3d5a80;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:18px 24px;position:sticky;top:0;z-index:10}
  .hrow{display:flex;align-items:center;gap:20px;flex-wrap:wrap;max-width:1200px;margin:0 auto}
  h1{font-size:19px;font-weight:700}
  h1 small{color:var(--muted);font-weight:400;font-size:12px;display:block;margin-top:2px}
  .total{flex:1;min-width:260px}
  .pbar{height:10px;background:var(--siva);border-radius:6px;overflow:hidden}
  .pbar>div{height:100%;background:var(--zelena);transition:width .3s;border-radius:6px}
  .pnums{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px}
  .pnums b{color:var(--ink)}
  .hbtns{display:flex;gap:8px}
  button{cursor:pointer;font:inherit}
  .btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:13px}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  main{max-width:1200px;margin:0 auto;padding:18px 24px 80px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:10px;margin-bottom:18px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer}
  .stat.on{outline:2px solid var(--accent)}
  .stat .mn{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px}
  .stat .mp{font-size:18px;font-weight:700;margin:3px 0}
  .stat .pbar{height:5px}

  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  input[type=text],select{font:inherit;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card)}
  input[type=text]{flex:1;min-width:180px}
  .chip{border:1px solid var(--border);background:var(--card);border-radius:20px;padding:5px 12px;font-size:12px}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .epic{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .ehead{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
  .ehead:hover{background:#fbfaf7}
  .arrow{transition:transform .15s;color:var(--muted);font-size:11px}
  .open .arrow{transform:rotate(90deg)}
  .ename{font-weight:600;font-size:14.5px;flex:1}
  .ename .ref{color:var(--muted);font-weight:400;font-size:12px;margin-left:6px}
  .ems{font-size:11px;background:var(--siva);border-radius:5px;padding:2px 7px;color:#555;white-space:nowrap}
  .ecount{font-size:12px;color:var(--muted);white-space:nowrap}
  .ebar{width:110px}
  .tasks{border-top:1px solid var(--border);display:none}
  .open .tasks{display:block}
  .task{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 20px;border-bottom:1px solid #f2f0ea}
  .task:last-of-type{border-bottom:none}
  .task:hover{background:#fbfaf7}
  .tname{flex:1;line-height:1.35}
  .tname .ref{color:var(--muted);font-size:11.5px;margin-left:6px}
  .done .tname{text-decoration:line-through;color:var(--muted)}
  .st{border:none;border-radius:6px;padding:4px 8px;font-size:11.5px;font-weight:600;width:110px;appearance:none;text-align:center;cursor:pointer}
  .st0{background:var(--siva);color:#555}
  .st1{background:var(--plava);color:#1e3a5f}
  .st2{background:var(--crvena);color:#7a2020}
  .st3{background:var(--zelena);color:#2f4d12}
  .pri{font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 6px;white-space:nowrap}
  .priV{background:var(--crvena);color:#7a2020}
  .priS{background:var(--zuta);color:#7a5200}
  .priN{background:var(--siva);color:#666}
  .del{background:none;border:none;color:#c8c2b6;font-size:15px;padding:0 4px;visibility:hidden}
  .task:hover .del{visibility:visible}
  .del:hover{color:#c0392b}
  .addrow{display:flex;gap:8px;padding:10px 16px;background:#fbfaf7}
  .addrow input{flex:1}
  .addrow select{width:auto}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);flex-wrap:wrap;margin-bottom:14px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>Mreža poverenja — Plan implementacije<small>Praćenje izrade po Kompletnoj specifikaciji v3.9</small></h1>
    <div class="total">
      <div class="pnums"><span>Ukupan napredak</span><span><b id="tDone">0</b> / <span id="tAll">0</span> (<b id="tPct">0%</b>)</span></div>
      <div class="pbar"><div id="tBar" style="width:0%"></div></div>
    </div>
    <div class="hbtns">
      <button class="btn" onclick="exportJSON()">Export JSON</button>
      <button class="btn" onclick="document.getElementById('imp').click()">Import</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(this)">
    </div>
  </div>
</header>
<main>
  <div class="stats" id="stats"></div>
  <div class="filters">
    <input type="text" id="q" placeholder="Pretraga taskova…" oninput="render()">
    <select id="fSt" onchange="render()">
      <option value="">Svi statusi</option>
      <option value="0">Otvoren</option><option value="1">U toku</option>
      <option value="2">Blokiran</option><option value="3">Završen</option>
    </select>
    <select id="fPri" onchange="render()">
      <option value="">Svi prioriteti</option>
      <option value="V">Visok</option><option value="S">Srednji</option><option value="N">Nizak</option>
    </select>
    <button class="chip" id="fOpen" onclick="hideDone=!hideDone;render()">Sakrij završene</button>
    <button class="chip" onclick="expandAll(true)">Otvori sve</button>
    <button class="chip" onclick="expandAll(false)">Zatvori sve</button>
  </div>
  <div class="legend">
    <span><i style="background:var(--siva)"></i>Otvoren</span>
    <span><i style="background:var(--plava)"></i>U toku</span>
    <span><i style="background:var(--crvena)"></i>Blokiran</span>
    <span><i style="background:var(--zelena)"></i>Završen</span>
    <span style="margin-left:auto">Boje prate palete iz specifikacije (§10.4)</span>
  </div>
  <div id="epics"></div>
</main>
<footer>Napredak se čuva samo u ovoj sesiji — koristite Export JSON za trajno čuvanje, Import za nastavak.</footer>

// ---------- state ----------
let state = {};           // taskKey -> status (0-3)
let custom = {};          // epicId -> [{n,p,ref}]
let openEpics = {};       // epicId -> bool
let hideDone = false;
let msFilter = "";
let nextCustomId = 1;
PLAN.forEach(e => openEpics[e.id] = true);

const key = (eid,i,c) => (c?'c':'t') + eid + '_' + i;
const ST_LABELS = ["Otvoren","U toku","Blokiran","Završen"];
const PRI_LABELS = {V:"Visok",S:"Srednji",N:"Nizak"};

function allTasks(e){
  const base = e.t.map((t,i)=>({k:key(e.id,i,false), n:t[0], p:t[1], ref:t[2], custom:false, idx:i}));
  const cus = (custom[e.id]||[]).map((t,i)=>({k:t.k, n:t.n, p:t.p, ref:"custom", custom:true, idx:i}));
  return base.concat(cus);
}
function st(k){ return state[k]||0; }

function matches(t){
  const q = document.getElementById('q').value.toLowerCase();
  const fs = document.getElementById('fSt').value;
  const fp = document.getElementById('fPri').value;
  if(q && !(t.n.toLowerCase().includes(q) || (t.ref||'').toLowerCase().includes(q))) return false;
  if(fs!=="" && String(st(t.k))!==fs) return false;
  if(fp && t.p!==fp) return false;
  if(hideDone && st(t.k)===3) return false;
  return true;
}

function render(){
  // stats per milestone
  let sh = "";
  let gAll=0,gDone=0;
  const msAgg = {};
  PLAN.forEach(e=>{
    const ts = allTasks(e);
    if(!msAgg[e.ms]) msAgg[e.ms]={a:0,d:0};
    ts.forEach(t=>{ msAgg[e.ms].a++; if(st(t.k)===3) msAgg[e.ms].d++; gAll++; if(st(t.k)===3) gDone++; });
  });
  Object.keys(MS).forEach(m=>{
    const a=msAgg[m]||{a:0,d:0};
    const pct=a.a?Math.round(a.d/a.a*100):0;
    sh += `<div class="stat ${msFilter===m?'on':''}" onclick="toggleMs('${m}')">
      <div class="mn">${m} · ${MS[m]}</div><div class="mp">${pct}%</div>
      <div class="pbar"><div style="width:${pct}%;background:${pct===100?'var(--zelena)':'var(--plava)'}"></div></div>
    </div>`;
  });
  document.getElementById('stats').innerHTML = sh;
  document.getElementById('tAll').textContent = gAll;
  document.getElementById('tDone').textContent = gDone;
  const gp = gAll?Math.round(gDone/gAll*100):0;
  document.getElementById('tPct').textContent = gp+'%';
  document.getElementById('tBar').style.width = gp+'%';
  document.getElementById('fOpen').classList.toggle('on',hideDone);

  // epics
  let h="";
  PLAN.forEach(e=>{
    if(msFilter && e.ms!==msFilter) return;
    const ts = allTasks(e);
    const done = ts.filter(t=>st(t.k)===3).length;
    const vis = ts.filter(matches);
    const filtering = document.getElementById('q').value || document.getElementById('fSt').value!=="" || document.getElementById('fPri').value || hideDone;
    if(filtering && vis.length===0) return;
    const pct = ts.length?Math.round(done/ts.length*100):0;
    h += `<div class="epic ${openEpics[e.id]?'open':''}" id="ep_${e.id}">
      <div class="ehead" onclick="toggleEpic('${e.id}')">
        <span class="arrow">▶</span>
        <span class="ename">${e.naziv}<span class="ref">${e.ref}</span></span>
        <span class="ems">${MS[e.ms]}</span>
        <span class="ecount">${done}/${ts.length}</span>
        <span class="ebar pbar"><span style="display:block;height:100%;width:${pct}%;background:${pct===100?'var(--zelena)':'var(--plava)'};border-radius:6px"></span></span>
      </div>
      <div class="tasks">`;
    vis.forEach(t=>{
      const s = st(t.k);
      h += `<div class="task ${s===3?'done':''}">
        <select class="st st${s}" onchange="setSt('${t.k}',this.value)">
          ${ST_LABELS.map((l,i)=>`<option value="${i}" ${i===s?'selected':''}>${l}</option>`).join('')}
        </select>
        <span class="tname">${t.n}<span class="ref">${t.ref}</span></span>
        <span class="pri pri${t.p}">${PRI_LABELS[t.p]}</span>
        ${t.custom?`<button class="del" title="Obriši" onclick="delCustom('${e.id}','${t.k}')">✕</button>`:`<span class="del"> </span>`}
      </div>`;
    });
    h += `<div class="addrow">
        <input type="text" id="add_${e.id}" placeholder="Dodaj novi task…" onkeydown="if(event.key==='Enter')addTask('${e.id}')">
        <select id="pri_${e.id}"><option value="S">Srednji</option><option value="V">Visok</option><option value="N">Nizak</option></select>
        <button class="btn" onclick="addTask('${e.id}')">Dodaj</button>
      </div></div></div>`;
  });
  document.getElementById('epics').innerHTML = h || '<div class="empty">Nema taskova za izabrane filtere.</div>';
}

function setSt(k,v){ state[k]=parseInt(v); render(); }
function toggleEpic(id){ openEpics[id]=!openEpics[id]; render(); }
function toggleMs(m){ msFilter = msFilter===m ? "" : m; render(); }
function expandAll(v){ PLAN.forEach(e=>openEpics[e.id]=v); render(); }
function addTask(eid){
  const inp = document.getElementById('add_'+eid);
  const n = inp.value.trim(); if(!n) return;
  const p = document.getElementById('pri_'+eid).value;
  if(!custom[eid]) custom[eid]=[];
  custom[eid].push({k:'c'+eid+'_'+(nextCustomId++), n, p});
  inp.value=''; render();
  document.getElementById('add_'+eid).focus();
}
function delCustom(eid,k){
  custom[eid] = (custom[eid]||[]).filter(t=>t.k!==k);
  delete state[k]; render();
}
function exportJSON(){
  const blob = new Blob([JSON.stringify({state,custom,nextCustomId,datum:new Date().toISOString()},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mreza-poverenja-napredak.json';
  a.click();
}
function importJSON(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const d = JSON.parse(r.result);
      state = d.state||{}; custom = d.custom||{}; nextCustomId = d.nextCustomId||1000;
      render();
    }catch(e){ alert('Nevažeći JSON fajl.'); }
  };
  r.readAsText(f);
  inp.value='';
}
render();
</script>
